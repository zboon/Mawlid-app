  :root{
    --green:#123528;
    --green-deep:#0B241B;
    --paper:#FAF5EA;
    --bg:#FAF5EA;
    --card:#ffffff;
    --card-alt:#FCF8EF;
    --paper-edge:#EFE6D2;
    --gold:#B8934A;
    --gold-soft:#D8C193;
    --ink:#26281F;
    --ink-soft:#6B6A5C;
    --chip-ink:#123528;   /* control-chip label; must contrast with the page, not the header */
    --ar-color:#0B241B;
    --accent-green:#1E5540;    /* bismillah + section titles: light enough to read as green */
    --ar-size:1.9rem;
  }
  :root.dark{
    --green:#1B3A2C;
    --green-deep:#0E2318;
    /* --paper stays light: it's the text colour on the green header/bars */
    --bg:#12150E;
    --card:#1E2318;
    --card-alt:#232819;
    --paper-edge:#2E3324;
    --gold:#C9A55E;
    --gold-soft:#D8C193;
    --ink:#ECE7D6;
    --ink-soft:#C7C3AF;   /* brightened: was #A3A08E, too dim for the translation line */
    --chip-ink:#EFE7CF;   /* light label on the dark card, instead of the dark green */
    --ar-color:#F3ECD8;
    --accent-green:#618B77;    /* pushed toward the header's forest green (#1B3A2C) as far as
                                  readability allows: this also colours the ~19px section
                                  titles, which need 4.5:1. The header green itself is 1.5:1
                                  here — invisible. */
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html{-webkit-text-size-adjust:100%}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:'Karla',system-ui,sans-serif;
    min-height:100vh;
    min-height:100dvh;
  }
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}

  /* ---------- header ---------- */
  .masthead{
    background:var(--green);
    color:var(--paper);
    padding:calc(env(safe-area-inset-top, 0px) + 2.2rem) 1.4rem 1.8rem;
    text-align:center;
    position:relative;
  }
  .masthead .logo{
    display:block;
    width:min(210px, 52%);
    height:auto;
    margin:.3rem auto .5rem;
  }
  .masthead .sub{
    font-family:'Crimson Pro',serif;
    font-style:italic;
    font-size:1.05rem;
    color:var(--gold-soft);
    margin:.35rem auto 0;
    letter-spacing:.02em;
    line-height:1.45;
    max-width:26ch;      /* wraps to a tidy two lines on a phone, one on desktop */
    text-wrap:balance;   /* keeps both lines of similar length where supported */
  }
  .star-band{display:block;margin:1.1rem auto 0;width:min(240px,70%)}
  .theme-toggle{
    position:absolute;top:calc(env(safe-area-inset-top, 0px) + .8rem);right:.9rem;
    width:2.3rem;height:2.3rem;border-radius:50%;
    background:rgba(250,245,234,.14);color:var(--paper);
    font-size:1.15rem;line-height:1;
    display:flex;align-items:center;justify-content:center;
  }
  .theme-toggle:active{background:rgba(250,245,234,.28)}

  /* ---------- top nav bar (sections, left-to-right) ---------- */
  .tabbar{
    display:flex;gap:.5rem;overflow-x:auto;-webkit-overflow-scrolling:touch;
    padding:.9rem 1rem;background:var(--green-deep);
    scrollbar-width:none;
    justify-content:flex-start;
  }
  /* Center the tabs only when they all fit; when they overflow, this wrapper
     keeps them left-aligned so the first tab is always reachable to scroll. */
  .tabbar > .tab:first-child{margin-left:auto}
  .tabbar > .tab:last-child{margin-right:auto}
  .tabbar::-webkit-scrollbar{display:none}
  .tab{
    flex:0 0 auto;display:flex;flex-direction:column;align-items:center;gap:.15rem;
    padding:.55rem .9rem;border-radius:12px;
    background:rgba(250,245,234,.08);color:var(--paper);
    border:1.5px solid transparent;transition:background .12s,border-color .12s;
    min-width:5.2rem;
  }
  .tab.active{background:var(--gold);border-color:var(--gold-soft);color:var(--green-deep)}
  .tab-en{font-size:.78rem;font-weight:700;line-height:1.15;text-align:center;white-space:nowrap}
  .tab-ar{font-family:'Amiri',serif;font-size:1rem;line-height:1;opacity:.85}
  .tab.active .tab-ar{opacity:1}

  /* ---------- placeholder for empty sections ---------- */
  .placeholder{
    text-align:center;color:var(--ink-soft);padding:2.4rem 1.4rem;line-height:1.6;
  }
  .placeholder .ph-star{font-family:'Amiri',serif;font-size:2.4rem;color:var(--gold);margin-bottom:.6rem}
  .placeholder strong{color:var(--green);font-size:1.05rem}
  .placeholder p{margin:.5rem 0}

  /* ---------- index list ---------- */
  .index{max-width:640px;margin:0 auto;padding:1.4rem 1.1rem calc(env(safe-area-inset-bottom,0px) + 3rem)}
  .index-label{
    font-size:.75rem;font-weight:700;letter-spacing:.18em;text-transform:uppercase;
    color:var(--ink-soft);margin:.4rem 0 1rem;text-align:center;
  }
  .search-wrap{position:relative;margin:.2rem 0 1.4rem}
  /* Resting: quiet — transparent, thin border, dimmed. It's there when you
     want it and out of the way when you don't. */
  .search{
    width:100%;box-sizing:border-box;
    font-family:inherit;font-size:.95rem;color:var(--ink);
    background:transparent;
    border:1px solid var(--paper-edge);border-radius:12px;
    padding:.6rem 2.4rem .6rem 2.3rem;outline:none;
    opacity:.7;box-shadow:none;
    transition:opacity .15s, background .15s, border-color .15s, box-shadow .15s;
  }
  .search:hover{opacity:.9}
  /* Focused: full contrast, gold border, lifted */
  .search:focus{
    opacity:1;
    background:var(--card);
    border-color:var(--gold);
    box-shadow:0 2px 10px rgba(18,53,40,.10);
  }
  .search::placeholder{color:var(--ink-soft);opacity:.75}
  .search-icon{
    position:absolute;left:.8rem;top:50%;transform:translateY(-50%);
    width:.95rem;height:.95rem;color:var(--ink-soft);
    opacity:.5;pointer-events:none;
    transition:opacity .15s, color .15s;
  }
  .search-wrap:focus-within .search-icon{opacity:1;color:var(--gold)}
  /* On the home page the bar lives at the bottom. Sticky, so it stays within
     reach when search results run long above it. */
  .search-wrap.at-bottom{
    position:sticky;
    bottom:calc(env(safe-area-inset-bottom, 0px) + .85rem);
    margin:1.4rem 0 .3rem;
    z-index:5;
  }
  /* Needs a solid backdrop here — content scrolls underneath it. */
  .search-wrap.at-bottom .search{
    opacity:1;
    background:var(--card);
    box-shadow:0 2px 12px rgba(0,0,0,.10);
  }
  .search-wrap.at-bottom .search:focus{
    box-shadow:0 4px 16px rgba(0,0,0,.16);
  }
  .search::placeholder{color:var(--ink-soft);opacity:.7}
  .search-clear{
    position:absolute;right:.5rem;top:50%;transform:translateY(-50%);
    width:1.9rem;height:1.9rem;border-radius:50%;
    color:var(--ink-soft);font-size:.85rem;
    display:flex;align-items:center;justify-content:center;
  }
  .search-clear:active{background:var(--paper-edge)}
  .no-results{
    text-align:center;color:var(--ink-soft);font-size:.95rem;
    padding:2rem 1rem;line-height:1.5;
  }
  .qcard{
    display:flex;align-items:center;gap:1rem;width:100%;text-align:left;
    background:var(--card);
    border:1px solid var(--paper-edge);
    border-radius:14px;
    padding:1rem 1.1rem;
    margin-bottom:.8rem;
    box-shadow:0 1px 2px rgba(18,53,40,.06);
    transition:transform .12s ease, box-shadow .12s ease;
  }
  .qcard:active{transform:scale(.985)}
  .qcard .num{
    flex:none;width:2.4rem;height:2.4rem;border-radius:50%;
    border:1.5px solid var(--gold);color:var(--gold);
    display:flex;align-items:center;justify-content:center;
    font-family:'Amiri',serif;font-size:1.15rem;padding-top:2px;
  }
  .qcard .titles{flex:1;min-width:0}
  .qcard .t-ar{font-family:'Amiri',serif;font-size:1.35rem;line-height:1.4;direction:rtl;text-align:left;color:var(--ar-color)}
  .qcard .t-en{font-size:.85rem;color:var(--ink-soft);margin-top:.1rem}
  .qcard .chev{color:var(--gold);font-size:1.2rem}

  /* ---------- reader ---------- */
  .reader-bar{
    position:sticky;top:0;z-index:10;
    background:var(--green);color:var(--paper);
    padding:calc(env(safe-area-inset-top,0px) + .6rem) .8rem .6rem;
    display:flex;align-items:center;gap:.6rem;
    box-shadow:0 2px 8px rgba(11,36,27,.25);
  }
  .reader-bar .back{font-size:1rem;font-weight:700;padding:.45rem .7rem;border-radius:9px;background:rgba(250,245,234,.12)}
  .reader-bar .rtitle{flex:1;font-family:'Amiri',serif;font-size:1.2rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-align:center}
  .reader-bar .spacer{width:3.4rem}

  .controls{
    max-width:640px;margin:0 auto;padding:.8rem 1.1rem 0;
    display:flex;flex-wrap:wrap;gap:.5rem;justify-content:center;
  }
  .chip{
    font-size:.8rem;font-weight:700;letter-spacing:.03em;
    padding:.4rem .85rem;border-radius:999px;
    border:1.5px solid var(--gold);color:var(--chip-ink);background:transparent;
  }
  /* "Off" reads by its muted grey border and label, not by fading the text out —
     opacity alone made it unreadable on the dark background. */
  .chip.off{opacity:.85;border-color:var(--ink-soft);color:var(--ink-soft)}
  .chip.size{border-color:var(--paper-edge);background:var(--card)}

  .verses{max-width:640px;margin:0 auto;padding:1.2rem 1.1rem calc(env(safe-area-inset-bottom,0px) + 7rem)}
  .refrain-note{
    text-align:center;font-size:.78rem;letter-spacing:.14em;text-transform:uppercase;
    color:var(--gold);font-weight:700;margin:.2rem 0 1rem;
  }
  .qnote{
    background:var(--green);color:var(--paper);
    border-radius:14px;padding:.9rem 1.1rem;margin-bottom:.9rem;
    font-size:.92rem;line-height:1.5;text-align:center;
  }
  .qnote .qnote-ar{
    display:block;font-family:'Amiri',serif;font-size:1.15rem;
    color:var(--gold-soft);direction:rtl;margin-top:.4rem;
  }
  .qtune{
    display:flex;align-items:center;justify-content:center;gap:.4rem;
    background:var(--card);border:1.5px solid var(--gold);color:var(--green);
    border-radius:999px;padding:.6rem 1rem;margin-bottom:1.2rem;
    font-weight:700;font-size:.9rem;text-decoration:none;
  }
  .qtune:active{background:var(--paper-edge)}
  .verse{
    background:var(--card);border:1px solid var(--paper-edge);border-radius:16px;
    padding:1.3rem 1.2rem 1.15rem;margin-bottom:1rem;position:relative;
    box-shadow:0 1px 2px rgba(18,53,40,.05);
  }
  .verse.refrain{border-color:var(--gold-soft);background:linear-gradient(var(--card),var(--card-alt))}
  .v-num{
    position:absolute;top:-0.85rem;left:50%;transform:translateX(-50%);
    background:var(--bg);border:1.5px solid var(--gold);color:var(--gold);
    width:1.9rem;height:1.9rem;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    font-family:'Amiri',serif;font-size:.95rem;
  }
  .v-ar{
    font-family:'Amiri',serif;
    font-size:var(--ar-size);
    line-height:2.1;
    direction:rtl;text-align:center;color:var(--ar-color);
    margin-top:.3rem;
  }
  .v-tr{
    font-size:.95rem;font-style:italic;color:var(--ink);
    text-align:center;margin-top:.7rem;line-height:1.6;
  }
  .v-en{
    font-family:'Crimson Pro',serif;font-size:1.05rem;color:var(--ink-soft);
    text-align:center;margin-top:.55rem;line-height:1.55;
  }
  .v-latin{

      { ar: "اللّٰهُمَّ ادْخِلْنَا مَعَهُ الْجَنَّةَ فَإِنَّهُ أَوَّلُ مَنْ يَدْخُلُهَا، وَأَنْزِلْنَا مَعَهُ فِي قُصُورِهَا فَإِنَّهُ أَوَّلُ مَنْ يَنْزِلُهَا، وَارْحَمْنَا يَوْمَ يَشْفَعُ لِلْخَلَائِقِ فَتَرْحَمُهَا",
        tr: "Allāhumma adkhilnā maʿahu-l-jannata fa-innahu awwalu man yadkhuluhā, wa anzilnā maʿahu fī quṣūrihā fa-innahu awwalu man yanziluhā, wa-rḥamnā yawma yashfaʿu li-l-khalā'iqi fa-tarḥamuhā",
        en: "O Allah, bring us into the Garden with him, for he is the first to enter it; settle us with him in its palaces, for he is the first to dwell in them; and have mercy on us on the day he intercedes for creation and You show it mercy." },
      { ar: "اللّٰهُمَّ ارْزُقْنَا زِيَارَتَهُ فِي كُلِّ سَنَةْ، وَلَا تَجْعَلْنَا مِنَ الْغَافِلِينَ عَنْكَ وَلَا عَنْهُ قَدْرَ سَنَةْ",
        tr: "Allāhumma-rzuqnā ziyāratahu fī kulli sanah, wa lā tajʿalnā mina-l-ghāfilīna ʿanka wa lā ʿanhu qadra sanah",
        en: "O Allah, grant us his visit every year, and do not let us be heedless of You or of him for even the span of a year." },
      { ar: "اللّٰهُمَّ لَا تَجْعَلْ فِي مَجْلِسِنَا هَذَا أَحَدًا إِلَّا غَسَلْتَ بِمَاءِ التَّوْبَةِ ذُنُوبَهْ، وَسَتَرْتَ بِرِدَاءِ الْمَغْفِرَةِ عُيُوبَهْ",
        tr: "Allāhumma lā tajʿal fī majlisinā hādhā aḥadan illā ghasalta bi-mā'i-t-tawbati dhunūbah, wa satarta bi-ridā'i-l-maghfirati ʿuyūbah",
        en: "O Allah, leave no one in this gathering of ours except that You wash their sins with the water of repentance and cover their faults with the cloak of forgiveness." },
      { ar: "اللّٰهُمَّ إِنَّهُ كَانَ مَعَنَا فِي السَّنَةِ الْمَاضِيَةِ إِخْوَانٌ مَنَعَهُمُ الْقَضَاءُ عَنِ الْوُصُولِ إِلَى مِثْلِهَا، فَلَا تَحْرِمْهُمْ ثَوَابَ هَذِهِ اللَّيْلَةِ وَفَضْلَهَا ۞ رَحِمَهُمُ الله",
        tr: "Allāhumma innahu kāna maʿanā fī-s-sanati-l-māḍiyati ikhwānun manaʿahumu-l-qaḍā'u ʿani-l-wuṣūli ilā mithlihā, fa-lā taḥrimhum thawāba hādhihi-l-laylati wa faḍlahā · raḥimahumu-Llāh",
        en: "O Allah, brothers and sisters were with us last year whom Your decree kept from reaching another like it — do not deprive them of the reward and merit of this night. May Allah have mercy on them." },
      { ar: "اللّٰهُمَّ ارْحَمْنَا إِذَا صِرْنَا مِنْ أَصْحَابِ الْقُبُورْ، وَوَفِّقْنَا لِعَمَلٍ صَالِحٍ يَبْقَى سَنَاهُ عَلَى مَمَرِّ الدُّهُورْ",
        tr: "Allāhumma-rḥamnā idhā ṣirnā min aṣḥābi-l-qubūr, wa waffiqnā li-ʿamalin ṣāliḥin yabqā sanāhu ʿalā mamarri-d-duhūr",
        en: "O Allah, have mercy on us when we become people of the graves, and grant us righteous deeds whose radiance endures through the passing of ages." },
      { ar: "اللّٰهُمَّ اجْعَلْنَا لِآلَائِكَ ذَاكِرِينْ، وَلِنَعْمَائِكَ شَاكِرِينْ، وَلِيَوْمِ لِقَائِكَ مِنَ الذَّاكِرِينْ، أَحْيِنَا بِطَاعَتِكَ مَشْغُولِينْ، وَإِذَا تَوَفَّيْتَنَا فَتَوَفَّنَا غَيْرَ مَفْتُونِينَ وَلَا مَخْذُولِينْ، وَاخْتِمْ لَنَا مِنْكَ بِخَيْرٍ أَجْمَعِينْ ۞ اللّٰهُمَّ اكْفِنَا شَرَّ الظَّالِمِينْ (٣x)",
        tr: "Allāhumma-jʿalnā li-ālā'ika dhākirīn, wa li-naʿmā'ika shākirīn, wa li-yawmi liqā'ika mina-dh-dhākirīn, aḥyinā bi-ṭāʿatika mashghūlīn, wa idhā tawaffaytanā fa-tawaffanā ghayra maftūnīna wa lā makhdhūlīn, wa-khtim lanā minka bi-khayrin ajmaʿīn · Allāhumma-kfinā sharra-ẓ-ẓālimīn (3x)",
        en: "O Allah, make us mindful of Your bounties, thankful for Your blessings, and remembering the Day we meet You. Keep us alive occupied in Your obedience, and when You take us, take us untried by temptation and unforsaken, and seal all our affairs with good from You. O Allah, protect us from the evil of the oppressors (3x)." },
      { ar: "وَاجْعَلْنَا مِنْ فِتْنَةِ هَذِهِ الدُّنْيَا سَالِمِينْ",
        tr: "Wa-jʿalnā min fitnati hādhihi-d-dunyā sālimīn",
        en: "And keep us safe from the trials of this world." },
      { ar: "اللّٰهُمَّ اجْعَلْ هَذَا النَّبِيَّ الْكَرِيمَ لَنَا شَفِيعًا، وَارْزُقْنَا بِهِ يَوْمَ الْقِيَامَةِ مَقَامًا رَفِيعًا",
        tr: "Allāhumma-jʿal hādhā-n-nabiyya-l-karīma lanā shafīʿā, wa-rzuqnā bihi yawma-l-qiyāmati maqāman rafīʿā",
        en: "O Allah, make this noble Prophet our intercessor, and through him grant us an exalted station on the Day of Rising." },
      { ar: "اللّٰهُمَّ اسْقِنَا مِنْ حَوْضِ نَبِيِّكَ مُحَمَّدٍ صَلَّى اللهُ عَلَيْهِ وَسَلَّمَ شَرْبَةً هَنِيئَةً مَرِيئَةً لَا نَظْمَأُ بَعْدَهَا أَبَدًا، وَاحْشُرْنَا تَحْتَ لِوَائِهِ غَدًا",
        tr: "Allāhumma-sqinā min ḥawḍi nabiyyika Muḥammadin ṣallā-Llāhu ʿalayhi wa sallama sharbatan hanī'atan marī'atan lā naẓma'u baʿdahā abadā, wa-ḥshurnā taḥta liwā'ihi ghadā",
        en: "O Allah, give us to drink from the Pool of Your Prophet Muhammad ﷺ a wholesome, satisfying drink after which we never thirst again, and gather us beneath his banner tomorrow." },
      { ar: "اللّٰهُمَّ اغْفِرْ لَنَا بِهِ وَلِآبَائِنَا وَلِأُمَّهَاتِنَا، وَلِمَشَايِخِنَا وَذَوِي الْحُقُوقِ عَلَيْنَا، وَلِمَنْ أَجْرَى هَذَا الْخَيْرَ فِي هَذِهِ اللَّيْلَةْ، وَلِجَمِيعِ الْمُؤْمِنِينَ وَالْمُؤْمِنَاتْ، وَالْمُسْلِمِينَ وَالْمُسْلِمَاتْ، الْأَحْيَاءِ مِنْهُمْ وَالْأَمْوَاتْ",
        tr: "Allāhumma-ghfir lanā bihi wa li-ābā'inā wa li-ummahātinā, wa li-mashāyikhinā wa dhawī-l-ḥuqūqi ʿalaynā, wa liman ajrā hādhā-l-khayra fī hādhihi-l-laylah, wa li-jamīʿi-l-mu'minīna wa-l-mu'mināt, wa-l-muslimīna wa-l-muslimāt, al-aḥyā'i minhum wa-l-amwāt",
        en: "O Allah, through him forgive us, our fathers and our mothers, our shaykhs and all who hold rights over us, whoever brought about this goodness tonight, and all believing and Muslim men and women, the living among them and the departed." },
      { ar: "إِنَّكَ قَرِيبٌ مُجِيبُ الدَّعَوَاتْ ۞ وَقَاضِيَ الْحَاجَاتْ (٣x) ۞ وَغَافِرَ الذُّنُوبِ وَالْخَطِيئَاتْ ۞ يَا أَرْحَمَ الرَّاحِمِينْ (٣x)",
        tr: "Innaka qarībun mujību-d-daʿawāt · wa qāḍiya-l-ḥājāt (3x) · wa ghāfira-dh-dhunūbi wa-l-khaṭī'āt · yā arḥama-r-rāḥimīn (3x)",
        en: "Truly You are Near, the Answerer of supplications, the Fulfiller of needs (3x), the Forgiver of sins and faults — O Most Merciful of the merciful (3x)." },
      { ar: "وَصَلَّى اللهُ عَلَى سَيِّدِنَا مُحَمَّدٍ وَعَلَى آلِهِ وَصَحْبِهِ وَسَلَّمْ. سُبْحَانَ رَبِّكَ رَبِّ الْعِزَّةِ عَمَّا يَصِفُونَ، وَسَلَامٌ عَلَى الْمُرْسَلِينَ، وَالْحَمْدُ لِلّٰهِ رَبِّ الْعَالَمِينَ ۞ الفَاتِحَةْ",
        tr: "Wa ṣallā-Llāhu ʿalā sayyidinā Muḥammadin wa ʿalā ālihi wa ṣaḥbihi wa sallam. Subḥāna Rabbika Rabbi-l-ʿizzati ʿammā yaṣifūn, wa salāmun ʿalā-l-mursalīn, wa-l-ḥamdu lillāhi Rabbi-l-ʿālamīn · al-Fātiḥah",
        en: "And may Allah bless our master Muhammad and his family and companions, and grant them peace. Glorified is your Lord, the Lord of Might, above what they describe; peace be upon the messengers; and all praise belongs to Allah, Lord of the worlds. Al-Fatiha." }
    ]

      { ar: "حَدَى حَادِي السُّرَى بِاسْمِ الْحَبَائِبْ ۞ فَهَزَّ السُّكْرُ أَعْطَافَ الرَّكَائِبْ",
        tr: "Ḥadā ḥādī-s-surā bi-smi-l-ḥabā'ib · fa-hazza-s-sukru aʿṭāfa-r-rakā'ib",
        en: "The night caravaner sang the names of the beloved ones, and rapture swayed the flanks of the mounts." },
      { ar: "أَلَمْ تَرَهَا وَقَدْ مَدَّتْ خُطَاهَا ۞ وَسَالَتْ مِنْ مَدَامِعِهَا سَحَائِبْ",
        tr: "Alam tarahā wa qad maddat khuṭāhā · wa sālat min madāmiʿihā saḥā'ib",
        en: "Did you not see how the camels lengthened their strides, while clouds of tears streamed from their eyes?" },
      { ar: "وَمَالَتْ لِلْحِمَى طَرَبًا وَحَنَّتْ ۞ إِلَى تِلْكَ الْمَعَالِمِ وَالْمَلَاعِبْ",

        en: "They leaned toward the sanctuary in joy, yearning for those landmarks and beloved grounds." },
      { ar: "فَدَعْ جَذْبَ الزِّمَامِ وَلَا تَسُقْهَا ۞ فَقَائِدُ شَوْقِهَا لِلْحَيِّ جَاذِبْ",

      { ar: "فَهِمْ طَرَبًا كَمَا هَامَتْ وَإِلَّا ۞ فَإِنَّكَ فِي طَرِيقِ الْحُبِّ كَاذِبْ",

      { ar: "أَمَا هَذَا الْعَقِيقُ بَدَا وَهَذِي ۞ قِبَابُ الْحَيِّ لَاحَتْ وَالْمَضَارِبْ",

      { ar: "وَتِلْكَ الْقُبَّةُ الْخَضْرَا وَفِيهَا ۞ نَبِيٌّ نُورُهُ يَجْلُو الْغَيَاهِبْ",

        en: "And that is the Green Dome — within it rests a Prophet whose light dispels every darkness." },
      { ar: "وَقَدْ صَحَّ الرِّضَى وَدَنَا التَّلَاقِي ۞ وَقَدْ جَاءَ الْهَنَا مِنْ كُلِّ جَانِبْ",
        tr: "Wa qad ṣaḥḥa-r-riḍā wa danā-t-talāqī · wa qad jā'a-l-hanā min kulli jānib",
        en: "Acceptance is assured and the meeting draws near; happiness has arrived from every side." },
      { ar: "فَقُلْ لِلنَّفْسِ دُونَكِ وَالتَّمَلِّي ۞ فَمَا دُونَ الْحَبِيبِ الْيَوْمَ حَاجِبْ",

      { ar: "تَمَلِّي بِالْحَبِيبِ بِكُلِّ قَصْدٍ ۞ فَقَدْ حَصَلَ الْهَنَا وَالضِّدُّ غَائِبْ",

        en: "Delight fully in the Beloved with every intent — joy has been attained and all that opposes it is gone." },
      { ar: "نَبِيُّ اللهِ خَيْرُ الْخَلْقِ جَمْعًا ۞ لَهُ أَعْلَى الْمَنَاصِبِ وَالْمَرَاتِبْ",
        tr: "Nabiyyullāhi khayru-l-khalqi jamʿā · lahu aʿlā-l-manāṣibi wa-l-marātib",
        en: "The Prophet of Allah is the best of all creation; his are the highest offices and ranks." },
      { ar: "لَهُ الْجَاهُ الرَّفِيعُ لَهُ الْمَعَالِي ۞ لَهُ الشَّرَفُ الْمُؤَبَّدُ وَالْمَنَاقِبْ",
        tr: "Lahu-l-jāhu-r-rafīʿu lahu-l-maʿālī · lahu-sh-sharafu-l-mu'abbadu wa-l-manāqib",
        en: "His is the exalted esteem, his the heights of glory, his the everlasting honor and noble virtues." },
      { ar: "فَلَوْ أَنَّا سَعَيْنَا كُلَّ حِينٍ ۞ عَلَى الْأَحْدَاقِ لَا فَوْقَ النَّجَائِبْ",

      { ar: "عَلَيْهِ مِنَ الْمُهَيْمِنِ كُلَّ وَقْتٍ ۞ صَلَاةٌ مَا بَدَا نُورُ الْكَوَاكِبْ",

      { ar: "تَعُمُّ الْآلَ وَالْأَصْحَابَ طُرًّا ۞ جَمِيعَهُمْ وَعِتْرَتَهُ الْأَطَايِبْ",
        tr: "Taʿummu-l-āla wa-l-aṣḥāba ṭurrā · jamīʿahum wa ʿitratahu-l-aṭāyib",

/* ── Favourites ──────────────────────────────────────────────────
   Stored in this browser's localStorage, so they stay on the device and are
   never shared between people opening the same hosted link.
   The key is kind + titleEnglish (unique within every array) rather than an
   array index, so favourites survive adding, removing or reordering pieces.
   A favourite whose title is later edited is simply dropped. */
const FAV_KEY = 'mawlid-favs';

function loadFavs(){
  try { const v = JSON.parse(localStorage.getItem(FAV_KEY)); return Array.isArray(v) ? v : []; }
  catch(e){ return []; }
}
function saveFavs(){
  try { localStorage.setItem(FAV_KEY, JSON.stringify(state.favs)); } catch(e){}
}

const state = { showTr: true, showEn: true, arScale: 1, query: '', tab: 'home', burdahChapter: null, scrollSpeedIdx: 3, favs: loadFavs() };

/* The four content arrays, keyed by the same letters reopen() uses. */
function arrayOf(kind){
  return kind === 'q' ? QASIDAS
       : kind === 'b' ? BURDAH_CHAPTERS
       : kind === 's' ? SIRAH_CHAPTERS
       : kind === 'i' ? ILAHI_CHAPTERS
       : null;
}
function pieceOf(kind, idx){ const a = arrayOf(kind); return a ? a[idx] : null; }
function favKey(kind, piece){ return kind + '|' + piece.titleEnglish; }
function isFav(kind, idx){
  const p = pieceOf(kind, idx);
  return !!p && state.favs.includes(favKey(kind, p));
}
function toggleFav(kind, idx){
  const p = pieceOf(kind, idx);
  if(!p) return;
  const key = favKey(kind, p);
  const at = state.favs.indexOf(key);
  if(at >= 0) state.favs.splice(at, 1); else state.favs.push(key);
  saveFavs();
  updateFavUI(kind, idx);
}
/* Bookmark glyph: outline when unsaved, filled when saved. Drawn as SVG so it
   takes the app's gold via currentColor instead of an emoji's fixed colour. */
function bookmarkIcon(on){
  return `<svg viewBox="0 0 24 24" width="19" height="19" aria-hidden="true"
    fill="${on ? 'currentColor' : 'none'}" stroke="currentColor" stroke-width="1.7"
    stroke-linecap="round" stroke-linejoin="round">
    <path d="M6.5 3.5h11a.9.9 0 0 1 .9.9v15.8a.5.5 0 0 1-.77.42L12 16.8l-5.63 3.82a.5.5 0 0 1-.77-.42V4.4a.9.9 0 0 1 .9-.9z"/>
  </svg>`;
}

/* Update the star in place, so tapping it never disturbs your scroll position */
function updateFavUI(kind, idx){
  const btn = document.querySelector('.fav-btn');
  if(!btn) return;
  const on = isFav(kind, idx);
  btn.innerHTML = bookmarkIcon(on);
  btn.classList.toggle('on', on);
  btn.setAttribute('aria-label', on ? 'Remove bookmark' : 'Bookmark this');
}
/* Resolve saved keys back to live pieces, skipping any that no longer exist */
function favItems(){
  const out = [];
  state.favs.forEach(key => {
    const kind = key.slice(0, 1);
    const title = key.slice(2);
    const arr = arrayOf(kind);
    if(!arr) return;
    const idx = arr.findIndex(p => p.titleEnglish === title);
    if(idx >= 0) out.push({ kind, idx, piece: arr[idx] });
  });
  return out;
}

/* Fuzzy-normalize transliterated Arabic so different English spellings match.
   e.g. "Qaseeda", "kasida", "qasīda" all collapse to the same key.
   Steps: lowercase → strip diacritics/accents → drop non-letters →
   fold interchangeable sounds (q/k, ph/f, etc.) → collapse doubled letters. */
function normalize(str){
  if(!str) return '';
  let s = str.toLowerCase();
  // strip combining diacritical marks (ā ṣ ḥ ʿ etc.)
  s = s.normalize('NFD').replace(/[\u0300-\u036f]/g, '');
  // strip Arabic harakat/tatweel and fold letter variants, so searching Arabic
  // works whether or not the person types the vowel marks
  s = s.replace(/[\u064b-\u065f\u0670\u0640]/g, '');
  s = s.replace(/[أإآٱ]/g, 'ا').replace(/ى/g, 'ي').replace(/ؤ/g, 'و').replace(/ئ/g, 'ي').replace(/ة/g, 'ه');
  // remove Arabic transliteration marks and punctuation, keep a-z and arabic block
  s = s.replace(/[ʿʾ'`’‘_\-.,;:!?()\[\]"۞·]/g, ' ');
  // sound-folding for common spelling variants
  s = s
    .replace(/ph/g, 'f')
    .replace(/ck/g, 'k')
    .replace(/q/g, 'k')      // qasida = kasida
    .replace(/dh/g, 'd')
    .replace(/th/g, 't')
    .replace(/gh/g, 'g')
    .replace(/kh/g, 'h')
    .replace(/sh/g, 's')
    .replace(/ee/g, 'i')     // nabee = nabi
    .replace(/ii/g, 'i')
    .replace(/ea/g, 'i')
    .replace(/oo/g, 'u')     // rasool = rasul
    .replace(/ou/g, 'u')
    .replace(/uu/g, 'u')
    .replace(/aa/g, 'a')     // salaam = salam
    .replace(/y/g, 'i')      // naby = nabi
    .replace(/w/g, 'u');
  // collapse any remaining doubled letters (rabbi = rabi, muhammad = muhamad)
  s = s.replace(/(.)\1+/g, '$1');
  // squeeze whitespace
  return s.replace(/\s+/g, ' ').trim();
}

/* Build a searchable haystack for each qasida (title + all verse text). */
function haystack(q){
  const parts = [q.titleEnglish, q.titleArabic];
  q.verses.forEach(v => { parts.push(v.tr, v.en, v.ar); });
  const joined = parts.join(' ');
  const norm = normalize(joined);
  return {
    norm,
    // space-free copy, so word breaks don't matter: "mawla ya" == "mawlaya".
    // Doubles are re-collapsed AFTER squeezing, since removing a space can
    // create one ("ar rahman" -> "arrahman" -> "arahman").
    tight: tighten(norm),
    raw: joined.toLowerCase(),
    ar: joined
  };
}

/* Space-free, double-free form used for spacing-insensitive matching. */
function tighten(normalized){
  return normalized.replace(/\s+/g, '').replace(/(.)\1+/g, '$1');
}

function matchesQuery(q, query){
  if(!query) return true;
  const nq = normalize(query);
  const h = haystack(q);
  // match on normalized (fuzzy) OR raw lowercase OR arabic-script substring
  if(nq && h.norm.includes(nq)) return true;
  // spacing-insensitive: "mawla ya" and "mawlaya" both find the same verse
  const tq = tighten(nq);
  if(tq && h.tight.includes(tq)) return true;
  const rawq = query.toLowerCase().trim();
  if(h.raw.includes(rawq)) return true;
  if(/[\u0600-\u06ff]/.test(query) && h.ar.includes(query.trim())) return true;
  return false;
}

function sectionCards(cat){
  const q = state.query;
  let items = QASIDAS.map((qa,i)=>({q:qa,i}))
    .filter(x=>x.q.category===cat)
    .filter(x=>matchesQuery(x.q, q));
  if(q){
    // rank: title matches first, then body-only matches
    const nq = normalize(q);
    const titleHit = (qa) => {
      const t = normalize(qa.titleEnglish + ' ' + qa.titleArabic);
      return (nq && t.includes(nq)) || (qa.titleEnglish + qa.titleArabic).toLowerCase().includes(q.toLowerCase().trim());
    };
    items.sort((a,b)=> (titleHit(b.q)?1:0) - (titleHit(a.q)?1:0));
  }
  if(items.length === 0) return '';
  return items.map(({q:qa,i},n)=>`
        <button class="qcard" onclick="openQasida(${i})">
          <span class="num">${toArNum(n+1)}</span>
          <span class="titles">
            <span class="t-ar">${qa.titleArabic}</span>
            <span class="t-en">${qa.titleEnglish}</span>
          </span>
          <span class="chev">›</span>
        </button>`).join('');
}

      { ar:"فَكَيْفَ تُنْكِرُ حُبًّا بَعْدَمَا شَهِدَتْ ۞ بِهِ عَلَيْكَ عُدُولُ الدَّمْعِ وَالسَّقَمِ",
        tr:"Fakayfa tunkiru ḥubban baʿda mā shahidat · Bihi ʿalayka ʿudūlud damʿi was saqami",
        en:"So how can you deny love, when the upright witnesses of tears and sickness have testified against you?" },
      { ar:"وَأَثْبَتَ الوَجْدُ خَطَّيْ عَبْرَةٍ وَضَنىً ۞ مِثْلَ البَهَارِ عَلَى خَدَّيْكَ وَالعَنَمِ",
        tr:"Wa athbatal wajdu khaṭṭay ʿabratin wa ḍanā · Mithlal bahāri ʿalā khaddayka wal ʿanami",
        en:"Yearning has traced two lines upon your cheeks — of tears and of wasting — like yellow blossom and red ʿanam." },
      { ar:"نَعَمْ سَرَى طَيْفُ مَنْ أَهْوَى فَأَرَّقَنِي ۞ وَالحُبُّ يَعْتَرِضُ اللَّذَّاتِ بِالأَلَمِ",
        tr:"Naʿam sarā ṭayfu man ahwā fa arraqanī · Wal ḥubbu yaʿtariḍul ladhdhati bil alami",
        en:"Yes — the phantom of the one I love passed by in the night and robbed me of sleep; love ever crosses its pleasures with pain." },
      { ar:"يَا لاَئِمِي فِي الهَوَى العُذْرِيِّ مَعْذِرَةً ۞ مِنِّي إِلَيْكَ وَلَوْ أَنْصَفْتَ لَمْ تَلُمِ",
        tr:"Yā lāʾimī fīl hawal ʿudhriyyi maʿdhiratan · Minnī ilayka wa law anṣafta lam talumi",
        en:"O you who blame me for this chaste love — I ask you to excuse me; had you been fair, you would not have blamed at all." },
      { ar:"عَدَتْكَ حَالِي لاَ سِرِّي بِمُسْتَتِرٍ ۞ عَنِ الْوُشَاةِ وَلاَ دَائِي بِمُنْحَسِمِ",
        tr:"ʿAdatka ḥāliya lā sirrī bi mustatirin · ʿAnil wushāti wa lā dāʾī bimunḥasimi",
        en:"May my state never befall you: my secret is not hidden from the slanderers, nor is my affliction brought to an end." },
      { ar:"مَحَّضْتَنِي النُصْحَ لَكِنْ لَسْتُ أَسْمَعُهُ ۞ إِنَّ المُحِبَّ عَنْ العُذَّالِ فِي صَمَمِ",
        tr:"Maḥḥaḍtanī nuṣḥa lākin lastu asmaʿuhu · Innal muḥibba ʿanil ʿudhdhāli fī ṣamami",
        en:"You gave me sincere counsel, yet I do not heed it — the lover is deaf to those who reproach him." },
      { ar:"إِنِّي اتَّهَمْتُ نَصِيحَ الشَّيْبِ فِي عَذَليِ ۞ وَالشَّيْبُ أَبْعَدُ فِي نُصْحِ عَنِ التُّهَمِ",
        tr:"Innit tahamtu naṣīḥash shaybi fī ʿadhalī · Wash shaybu abʿadu fī nuṣḥin ʿanit tuhami",
        en:"I have even held suspect the counsel of my grey hairs in their reproach — though grey hair, in its counsel, is the furthest from suspicion." }
    ] },
  { titleArabic:"فِي التَّحْذِيرِ مِنْ هَوَى النَّفْسِ", titleEnglish:"2 · On Warning against the Caprice of the Self", video:"https://youtu.be/CnfY5RCWBi0?t=355", verses:[
      { ar:"فَإِنَّ أَمَّارَتيِ بِالسُّوءِ مَا اتَّعَظَتْ ۞ مِنْ جَهْلِهَا بِنَذِيرِ الشَّيْبِ وَالهَرَمِ",
        tr:"Fa inna ammāratī bis sūʾi mat taʿaẓat · Min jahlihā bi nadhīrish shaybi wal harami",
        en:"For my soul, ever commanding evil, took no warning — in its ignorance — from the warner of grey hair and old age." },
      { ar:"وَلاَ أَعَدَّتْ مِنَ الفِعْلِ الجَمِيلِ قِرَى ۞ ضَيْفٍ أَلَمَّ بِرَأْسِي غَيْرَ مُحْتَشِمِ",
        tr:"Wa lā aʿaddat minal fiʿlil jamīli qirā · Ḍayfin alamma bi raʾsī ghayra muḥtashimi",
        en:"Nor did it prepare, from beautiful deeds, any welcome for the guest that settled upon my head without shame." },
      { ar:"لَوْ كُنْتُ أَعْلَمُ أَنِّي مَا أُوَقِّرُهُ ۞ كَتَمْتُ سِرًّا بَدَاليِ مَنْهُ بِالكَتَمِ",
        tr:"Law kuntu aʿlamu annī mā uwaqqiruhu · Katamtu sirran badālī minhu bil katami",
        en:"Had I known I would fail to honour it, I would have concealed with dye the secret its arrival laid bare." },
      { ar:"مَنْ لِي بِرَدِّ جِمَاحٍ مِنْ غَوَايَتِهَا ۞ كَمَا يُرَدُّ جِمَاحُ الخَيْلِ بِاللُّجُمِ",
        tr:"Man lī biraddi jimāḥin min ghiwāyatihā · Kamā yuraddu jimāḥul khayli bil lujumi",
        en:"Who will help me curb the bolting of my soul from its waywardness, as a bolting horse is curbed with the bridle?" },
      { ar:"فَلاَ تَرُمْ بِالمَعَاصِي كَسْرَ شَهْوَتِهَا ۞ إِنَّ الطَّعَامَ يُقَوِّي شَهْوَةَ النَّهِمِ",
        tr:"Falā tarum bil maʿāṣī kasra shahwatihā · Innaṭ ṭaʿāma yuqawwī shahwatan nahimi",
        en:"Do not seek to break its craving by yielding to sins — food only strengthens the craving of the glutton." },
      { ar:"وَالنَّفْسُ كَالطِّفِلِ إِنْ تُهْمِلْهُ شَبَّ عَلَى ۞ حُبِّ الرَّضَاعِ وَإِنْ تَفْطِمْهُ يَنْفَطِمِ",
        tr:"Wan nafsu kaṭṭifli in tuhmilhu shabba ʿalā · Ḥubbir raḍāʿi wa in tafṭimhu yanfaṭimi",
        en:"The soul is like an infant: neglect it, and it grows up still loving to suckle; but wean it, and it is weaned." },
      { ar:"فَاصْرِفْ هَوَاهَا وَحَاذِرْ أَنْ تُوَلِّيَهُ ۞ إِنَّ الهَوَى مَا تَوَلَّى يُصْمِ أَوْ يَصِمِ",
        tr:"Faṣrif hawāhā wa ḥādhir an tuwalliyahu · Innal hawā mā tawallā yuṣmi aw yaṣimi",
        en:"So turn away its desire, and beware of giving it charge — desire, once given charge, destroys or disgraces." },
      { ar:"وَرَاعِهَا وَهِيَ فِي الأَعْمَالِ سَائِمَةٌ ۞ وَإِنْ هِيَ اسْتَحْلَتِ المَرْعَى فَلاَ تُسِمِ",
        tr:"Wa rāʿihā wa hiya fīl aʿmāli sāʾimatun · Wa in hiyastaḥlatil marʿā falā tusimi",
        en:"Tend it while it grazes among deeds; and should it find the pasture sweet, do not let it roam free." },
      { ar:"كَمْ حَسَّنَتْ لَذَّةً لِلْمَرْءِ قَاتِلَةً ۞ مِنْ حَيْثُ لَمْ يَدْرِ أَنَّ السُّمَّ فِي الدَّسَمِ",
        tr:"Kam ḥassanat ladhdhatan lil marʾi qātilatan · Min ḥaythu lam yadri annas summa fid dasami",
        en:"How often it has made a deadly pleasure seem fair to a man, where he did not realise the poison lay within the rich food." },
      { ar:"وَاخْشَ الدَّسَائِسَ مِنْ جُوعٍ وَمِنْ شِبَعٍ ۞ فَرُبَّ مَخْمَصَةٍ شَرُّ مِنَ التُّخَمِ",
        tr:"Wakhshad dasāʾisa min jūʿin wa min shibaʿin · Farubba makhmaṣatin sharrun minat tukhami",
        en:"Fear the hidden snares in both hunger and satiety — many a bout of hunger is worse than a bout of overeating." },
      { ar:"وَاسْتَفْرِغِ الدَّمْعَ مِنْ عَيْنٍ قَدِ امْتَلَأَتْ ۞ مِنَ المَحَارِمِ وَالْزَمْ حِمْيَةَ النَّدَمِ",
        tr:"Wastafrighid damʿa min ʿaynin qadimtalaʾat · Minal maḥārimi walzam ḥimyatan nadami",
        en:"Empty of tears an eye that has filled itself with forbidden sights, and hold fast to the diet of remorse." },
      { ar:"وَخَالِفِ النَّفْسَ وَالشَّيْطَانَ وَاعْصِهِمَا ۞ وَإِنْ هُمَا مَحَضَاكَ النُّصْحَ فَاتَّهِمِ",
        tr:"Wa khālifin nafsa wash shayṭāna waʿṣihimā · Wa in humā maḥaḍākan nuṣḥa fat tahimi",
        en:"Oppose the soul and Satan, and disobey them both; and if they offer you sincere-seeming counsel, hold it suspect." },
      { ar:"وَلاَ تُطِعْ مِنْهُمَا خَصْمًا وَلاَ حَكَمًا ۞ فَأَنْتَ تَعْرِفُ كَيْدَ الخَصْمِ وَالحَكَمِ",
        tr:"Wa lā tuṭiʿ minhumā khaṣman walā ḥakaman · Fa anta taʿrifu kaydal khaṣmi wal ḥakami",
        en:"Obey neither of them as adversary nor as arbiter — for you well know the cunning of the adversary and the arbiter." },
      { ar:"أَسْتَغْفِرُ اللهَ مِنْ قَوْلٍ بِلاَ عَمَلٍ ۞ لَقَدْ نَسَبْتُ بِهِ نَسْلاً لِذِي عُقُمِ",
        tr:"AstaghfiruLlāha min qawlin bilā ʿamalin · Laqad nasbtu bihi naslan lidhī ʿuqumi",
        en:"I seek Allah's forgiveness for words unmatched by deeds — by them I have ascribed offspring to one who is barren." },
      { ar:"أَمَرْتُكَ الخَيْرَ لَكِنْ مَا ائْتَمَرْتُ بِهِ ۞ وَمَا اسْتَقَمْتُ فَمَا قَوْليِ لَكَ اسْتَقِمِ",
        tr:"Amartukal khayra lākin māʾtamartu bihi · Wa māstaqamtu famā qawlī lakastaqimi",
        en:"I bade you do good, yet did not heed it myself; I was not upright — so what worth is my saying to you, 'Be upright'?" },
      { ar:"وَلاَ تَزَوَّدْتُ قَبْلَ المَوْتِ نَافِلَةً ۞ وَلَمْ أُصَلِّ سِوَى فَرْضٍ وَلَمْ أَصُمِ",
        tr:"Wa lā tazawwadtu qablal mawti nāfīlatan · Wa lam uṣalli siwā farḍin wa lam aṣumi",
        en:"Nor did I lay up, before death, any voluntary works; I prayed nothing beyond the obligatory, and I did not fast." }
    ] },
  { titleArabic:"فِي مَدْحِ النَّبِيِّ ﷺ", titleEnglish:"3 · In Praise of the Prophet ﷺ", video:"https://youtu.be/CnfY5RCWBi0?t=648", verses:[
      { ar:"ظَلَمْتُ سُنَّةَ مَنْ أَحْيَا الظَّلاَمَ إِلَى ۞ أَنِ اشْتَكَتْ قَدَمَاهُ الضُّرَّ مِنْ وَرَمِ",
        tr:"Ẓalamtu sunnata man aḥyādh ẓalāma ilā · Anishtakat qadamāhuḍ ḍurra min warami",
        en:"I have wronged the way of him who kept the nights alive in prayer until his feet complained of the hurt of swelling." },
      { ar:"وَشَدَّ مِنْ سَغَبٍ أَحْشَاءَهُ وَطَوَى ۞ تَحْتَ الحِجَارَةِ كَشْحًا مُتْرَفَ الأَدَمِ",
        tr:"Wa shadda min saghabin aḥshāʾahu wa ṭawā · Taḥtal ḥijārati kash-ḥan mutrafal adami",
        en:"From hunger he bound in his belly, and folded beneath a stone a waist of soft and delicate skin." },
      { ar:"وَرَاوَدَتْهُ الجِبَالُ الشُّمُّ مِنْ ذَهَبٍ ۞ عَنْ نَفْسِهِ فَأَرَاهَا أَيَّمَا شَمَمِ",
        tr:"Wa rāwadat-hul jibālush shummu min dhahabin · ʿAn nafsihi fa arāhā ayyamā shamami",
        en:"The lofty mountains offered to become gold to tempt him, but he showed them a loftiness far above their own." },
      { ar:"وَأَكَّدَتْ زُهْدَهُ فِيهَا ضَرُورَتُهُ ۞ إِنَّ الضَّرُورَةَ لاَ تَعْدُو عَلَى العِصَمِ",
        tr:"Wa akkadat zuhdahu fīhā ḍarūratuhu · Innaḍ ḍarūrata lā taʿdū ʿalal ʿiṣami",
        en:"His very need only confirmed his detachment from them — for need never transgresses against the divinely protected." },
      { ar:"وَكَيْفَ تَدْعُو إِلَى الدُّنْيَا ضَرُورَةُ مَنْ ۞ لَوْلاَهُ لَمْ تُخْرَجِ الدُّنْيَا مِنَ العَدَمِ",
        tr:"Wa kayfa tadʿū ilad dunyā ḍarūratu man · Lawlāhu lam tukhrajid dunyā minal ʿadami",
        en:"And how could need summon to worldliness the one but for whom the world would never have been drawn out of nothingness?" },
      { ar:"مُحَمَّدٌ سَيِّدُ الكَوْنَيْنِ وَالثَّقَلَيْنِ ۞ وَالفَرِيقَيْنِ مِنْ عُرْبٍ وَمِنْ عَجَمِ",
        tr:"Muḥammadun sayyidul kawnayni wath thaqalayni · wal farīqayni min ʿurbin wa min ʿajami",
        en:"Muhammad, master of the two worlds, of both jinn and mankind, and of the two peoples, Arab and non-Arab." },
      { ar:"نَبِيُّنَا الآمِرُ النَّاهِي فَلاَ أَحَدٌ ۞ أَبَرَّ فِي قَوْلِ لاَ مِنْهُ وَلاَ نَعَمِ",
        tr:"Nabiyyunal āmirun nāhī falā aḥadun · Abarra fī qawli lā minhu wa lā naʿami",
        en:"Our Prophet, who commands and forbids — none is more truthful than he in a 'no' or a 'yes'." },
      { ar:"هُوَ الحَبِيبُ الذِّي تُرْجَى شَفَاعَتُهُ ۞ لِكُلِّ هَوْلٍ مِنَ الأَهْوَالِ مُقْتَحَمِ",
        tr:"Huwal ḥabībul ladhī turjā shafāʿatuhu · Li kulli hawlin minal ahwāli muqtaḥami",
        en:"He is the Beloved whose intercession is hoped for against every terror that comes crashing down." },
      { ar:"دَعَا إِلَى اللهِ فَالْمُسْتَمْسِكُونَ بِهِ ۞ مُسْتَمْسِكُونَ بِحَبْلٍ غَيْرِ مُنْفَصِمِ",
        tr:"Daʿā ilaLlāhi fal mustamsikūna bihi · Mustamsikūna biḥablin ghayri munfaṣimi",
        en:"He called to Allah; so those who hold fast to him hold fast to a rope that will never break." },
      { ar:"فَاقَ النَبِيّينَ فِي خَلْقٍ وَفِي خُلُقٍ ۞ وَلَمْ يُدَانُوهُ فِي عِلْمٍ وَلاَ كَرَمِ",
        tr:"Fāqan nabiyyīna fī khalqin wa fī khuluqin · Wa lam yudānūhu fī ʿilmin wa lā karami",
        en:"He surpassed the Prophets in form and in character, and they did not draw near him in knowledge or in nobility." },
      { ar:"وَكُلُّهُمْ مِنْ رَسُولِ اللهِ مُلْتَمِسٌ ۞ غَرْفًا مِنَ البَحْرِ أَوْ رَشْفًا مِنَ الدِّيَمِ",
        tr:"Wa kulluhum min rasūliLlāhi multamisun · Gharfan minal baḥri aw rashfan minad diyami",
        en:"Each of them seeks from the Emissary of Allah a handful from his sea, or a sip from his gentle rains." },
      { ar:"وَوَاقِفُونَ لَدَيْهِ عِنْدَ حَدِّهِمِ ۞ مِنْ نُقْطَةِ العِلْمِ أَوْ مِنْ شَكْلَةِ الحِكَمِ",
        tr:"Wa wāqifūna ladayhi ʿinda ḥaddihimi · Min nuqṭatil ʿilmi aw min shaklatil ḥikami",
        en:"And they stand before him, each at his own limit — a single dot of his knowledge, or one vowel-mark of his wisdom." },
      { ar:"فَهْوَ الذِّي تَمَّ مَعْنَاهُ وَصُورَتُهُ ۞ ثُمَّ اصْطَفَاهُ حَبِيبًا بَارِئُ النَّسَمِ",
        tr:"Fa huwal ladhī tamma maʿnāhu wa ṣūratuhu · Thummaṣṭafāhu ḥabīban bāriʾun nasami",
        en:"He is the one whose inner meaning and outer form were made perfect; then the Fashioner of souls chose him as His beloved." },
      { ar:"مُنَزَّهٌ عَنْ شَرِيكٍ فِي مَحَاسِنِهِ ۞ فَجَوْهَرُ الحُسْنِ فِيهِ غَيْرُ مُنْقَسِمِ",
        tr:"Munazzahun ʿan sharīkin fī maḥāsinihi · Fa jawharul ḥusni fīhi ghayru munqasimi",
        en:"Far above having any rival in his excellences — for in him the essence of beauty is undivided." },
      { ar:"دَعْ مَا ادَّعَتْهُ النَّصَارَى فِي نَبِيِّهِمِ ۞ وَاحْكُمْ بِمَا شِئْتَ مَدْحًا فِيهِ وَاحْتَكِمِ",
        tr:"Daʿ maddaʿat-hun naṣārā fī nabiyyihimi · Waḥkum bimā shiʾta mad-ḥan fīhi waḥtakimi",
        en:"Leave aside what the Christians claimed of their prophet; then decree what praise you will of him, and judge freely." },
      { ar:"وَانْسُبْ إِلَى ذَاتِهِ مَا شِئْتَ مِنْ شَرَفٍ ۞ وَانْسُبْ إِلَى قَدْرِهِ مَا شِئْتَ مِنْ عِظَمِ",
        tr:"Wansub ilā dhātihi mā shiʾta min sharafin · Wansub ilā qadrihi mā shiʾta min ʿiẓami",
        en:"Ascribe to his person what nobility you will, and ascribe to his rank what greatness you will." },
      { ar:"فَإِنَّ فَضْلَ رَسُولِ اللهِ لَيْسَ لَهُ ۞ حَدٌّ فَيُعْرِبَ عَنْهُ نَاطِقٌ بِفَمِ",
        tr:"Fa inna faḍla rasūliLlāhi laysa lahu · Ḥaddun fa yuʿriba ʿanhu nāṭiqun bifami",
        en:"For the excellence of Allah's Emissary has no limit that a speaker could ever put into words with his mouth." },
      { ar:"لَوْ نَاسَبَتْ قَدْرَهُ آيَاتُهُ عِظَمًا ۞ أَحْيَا اسْمُهُ حِينَ يُدْعَى دَارِسَ الرِّمَمِ",
        tr:"Law nāsabat qadrahu āyātuhu ʿiẓaman · Aḥyaʾsmuhu ḥīna yudʿā dārisar rimami",
        en:"Had his miracles matched his rank in greatness, the mere calling of his name would revive bones long decayed." },
      { ar:"لَمْ يَمْتَحِنَّا بِمَا تَعْيَا الْعُقُولُ بِهِ ۞ حِرْصًا عَلَيْنَا فَلَمْ نَرْتَبْ وَلَمْ نَهِمْ",
        tr:"Lam yamtaḥinnā bimā taʿyal ʿuqūlu bihi · Ḥirṣan ʿalayna falam nartab wa lam nahimi",
        en:"Out of care for us he did not test us with what the minds cannot bear, so we neither doubted nor lost our way." },
      { ar:"أَعْيَا الوَرَى فَهْمُ مَعْنَاهُ فَلَيْسَ يُرَى ۞ فِي القُرْبِ وَالْبُعْدِ فِيهِ غَيْرُ مُنْفَحِمِ",
        tr:"Aʿyal warā fahmu maʿnāhu falaysa yurā · Fīl qurbi wal buʿdi fīhi ghayru munfaḥimi",
        en:"Grasping his reality has wearied all creation; near or far, none is seen before him but the dumbstruck." },
      { ar:"كَالشَّمْسِ تَظْهَرُ لِلْعَيْنَيْنِ مِنْ بُعُدٍ ۞ صَغِيرَةً وَتُكِلُّ الطَّرْفَ مِنْ أَمَمِ",
        tr:"Kash shamsi taẓ-haru lil ʿaynayni min buʿudin · Ṣaghīratan wa tukilluṭ ṭarfa min amami",
        en:"Like the sun, which appears small to the eyes from afar, yet overwhelms the sight when close at hand." },
      { ar:"وَكَيْفَ يُدْرِكُ فِي الدُّنْيَا حَقِيقَتَهُ ۞ قَوْمٌ نِيَامٌ تَسَلَّوْا عَنْهُ بِالحُلُمِ",
        tr:"Wa kayfa yudriku fid dunyā ḥaqīqatahu · Qawmun niyāmun tasallū ʿanhu bil ḥulumi",
        en:"How could his reality be grasped in this world by a sleeping people, content to know him only through dreams?" },
      { ar:"فَمَبْلَغُ العِلْمِ فِيهِ أَنَّهُ بَشَرٌ ۞ وَأَنَّهُ خَيْرُ خَلْقِ اللهِ كُلِّهِمِ",
        tr:"Fa mablaghul ʿilmi fīhi annahu basharun · Wa annahu khayru khalqiLlāhi kullihimi",
        en:"The utmost our knowledge reaches of him is that he is a man, and that he is the best of all Allah's creation." },
      { ar:"وَكُلُّ آيٍ أَتَى الرُّسْلُ الكِرَامُ بِهَا ۞ فَإِنَّمَا اتَّصَلَتْ مِنْ نُوِرِهِ بِهِمِ",
        tr:"Wa kullu āyin atar ruslul kirāmu bihā · Fa innamat taṣalat min nūrihi bihimi",
        en:"Every sign the noble Emissaries brought reached them only through connection with his light." },
      { ar:"فَإِنَّهُ شَمْسُ فَضْلٍ هُمْ كَوَاكِبُهَا ۞ يُظْهِرْنَ أَنْوَارَهاَ لِلنَّاسِ فِي الظُّلَمِ",
        tr:"Fa innahu shamsu faḍlin hum kawākibuhā · Yuẓ-hirna anwārahā lin nāsi fidh ẓulami",
        en:"For he is the sun of grace, and they are its stars, showing forth its lights to people in the darkness." },
      { ar:"أَكْرِمْ بِخَلْقِ نَبِيٍ زَانَهُ خُلُقٌ ۞ بِالحُسْنِ مُشْتَمِلٍ بِالبِشْرِ مُتَّسِمِ",
        tr:"Akrim bikhalqi nabiyyin zānahu khuluqun · Bil ḥusni mushtamilin bil bishri muttasimi",
        en:"How noble the form of a Prophet adorned by character — wrapped in beauty, marked by a cheerful, smiling face." },
      { ar:"كَالزَّهْرِ فِي تَرَفٍ وَالبَدْرِ فِي شَرَفٍ ۞ وَالبَحْرِ فِي كَرَمٍ وَالدَّهْرِ فِي هِمَمِ",
        tr:"Kaz zahri fī tarafin wal badri fī sharafin · Wal baḥri fī karamin wad dahri fī himami",
        en:"Like the flower in delicate beauty, the full moon in honour, the sea in generosity, and all of time in resolve." },
      { ar:"كَأَنَّه وَهْوَ فَرْدٌ مِنْ جَلاَلَتِهِ ۞ فِي عَسْكَرٍ حِينَ تَلْقَاهُ وَفِي حَشَمِ",
        tr:"Ka annahu wa huwa fardun min jalālatihi · Fī ʿaskarin ḥīna talqāhu wa fī ḥashami",
        en:"So great his majesty that, though alone when you meet him, he seems amid an army and a retinue." },
      { ar:"كَأَنَّمَا اللُّؤْلُؤْ المَكْنُونُ فِي صَدَفٍ ۞ مِنْ مَعْدِنَيْ مَنْطِقٍ مِنْهُ وَمُبْتَسِمِ",
        tr:"Ka annamal luʾluʾul maknūnu fī ṣadafin · Min maʿdinay manṭiqin minhu wa mubtasami",
        en:"As if guarded pearls in their shells came forth from the twin mines of his speech and his smile." },
      { ar:"لاَ طِيبَ يَعْدِلُ تُرْبًا ضَمَّ أَعْظُمَهُ ۞ طُوبىَ لِمُنْتَشِقٍ مِنْهُ وَمُلْتَثِمِ",
        tr:"Lā ṭība yaʿdilu turban ḍamma aʿẓumahu · Ṭūbā li muntashiqin minhu wa multathimi",
        en:"No perfume equals the earth that embraces his blessed remains; blessed is the one who breathes its scent or kisses it." }
    ] },
  { titleArabic:"فِي مَوْلِدِهِ ﷺ", titleEnglish:"4 · On His Noble Birth", video:"https://youtu.be/CnfY5RCWBi0?t=1213", verses:[
      { ar:"أَبَانَ مَوْلِدُهُ عَنْ طِيبِ عُنْصُرِهِ ۞ يَا طِيبَ مُبْتَدَإٍ مِنْهُ وَمُخْتَتَمِ",
        tr:"Abāna mawliduhu ʿan ṭībi ʿunṣurihi · Yā ṭība mubtadaʾin minhu wa mukhtatami",
        en:"His birth made plain the purity of his origin — O how pure were his beginning and his end!" },
      { ar:"يَوْمٌ تَفَرَّسَ فِيهِ الفُرْسُ أَنَّهُمُ ۞ قَدْ أُنْذِرُوا بِحُلُولِ البُؤْسِ وَالنِّقَمِ",
        tr:"Yawmun tafarrasa fīhil fursu annahumu · Qad undhirū biḥulūlil buʾsi wan niqami",
        en:"A day on which the Persians sensed that they had been warned of the coming of misery and retribution." },
      { ar:"وَبَاتَ إِيوَانُ كِسْرَى وَهُوَ مُنْصَدِعٌ ۞ كَشَمْلِ أَصْحَابِ كِسْرَى غَيْرَ مُلْتَئِمِ",
        tr:"Wa bāta īwānu kisrā wa huwa munṣadiʿun · Ka shamli aṣ-ḥābi kisrā ghayra multaʾimi",
        en:"The palace of Chosroes passed the night split apart, like the fellowship of Chosroes' people, never to be made whole again." },
      { ar:"وَالنَّارُ خَامِدَةُ الأَنْفَاسِ مِنْ أَسَفٍ ۞ عَلَيْهِ وَالنَّهْرُ سَاهِي العَيْنِ مِنْ سَدَمِ",
        tr:"Wan nāru khāmidatul anfāsi min asafin · ʿAlayhi wan nahru sāhil ʿayni min sadami",
        en:"The sacred fire lay dead of breath from grief over it, and the river ran dry of eye from sorrow." },
      { ar:"وَسَاءَ سَاوَةَ أَنْ غَاضَتْ بُحَيْرَتُهَا ۞ وَرُدَّ وَارِدُهَا بِالغَيْظِ حِينَ ظَمِي",
        tr:"Wa sāʾa sāwata an ghāḍat buḥayratuhā · Wa rudda wāriduhā bil ghayẓi ḥīna ẓamī",
        en:"It grieved Sāwa that its lake sank away, and the one who came to it thirsty was turned back in rage." },
      { ar:"كَأَنَّ بِالنَّارِ مَا بِالمَاءِ مِنْ بَلَلٍ ۞ حُزْنًا وَبِالمَاءِ مَا بِالنَّارِ مِنْ ضَرَمِ",
        tr:"Ka anna bin nāri mā bil māʾi min balalin · Ḥuznan wa bil māʾi mā bin nāri min ḍarami",
        en:"As though, in grief, the fire held the wetness of water, and the water held the fire's own burning." },
      { ar:"وَالجِنُّ تَهْتِفُ وَالأَنْوَارُ سَاطِعَةٌ ۞ وَالحَّقُ يَظْهَرُ مِنْ مَعْنىً وَمِنْ كَلِمِ",
        tr:"Wal jinnu tahtifu wal anwāru sāṭiʿatun · Wal ḥaqqu yaẓ-haru min maʿnan wa min kalimi",
        en:"The jinn cried out, the lights blazed forth, and the Truth appeared in meaning and in word." },
      { ar:"عَمُوا وَصَمُّوا فَإِعْلاَنُ البَشَائِرِ لَمْ ۞ يُسْمَعْ وَبَارِقَةُ الإِنْذَارِ لَمْ تُشَمِ",
        tr:"ʿAmmū wa ṣammū fa iʿlānul bashāʾiri lam · Yusmaʿ wa bāriqatul indhāri lam tushami",
        en:"They were blind and deaf: the proclamation of glad tidings went unheard, and the lightning of warning went unheeded." },
      { ar:"مِنْ بَعْدِ مَا أَخْبَرَ الأَقْوَامَ كَاهِنُهُمْ ۞ بِأَنَّ دِينَهُمُ المُعْوَجَّ لَمْ يَقُمِ",
        tr:"Min baʿdi mā akhbaral aqwāma kāhinuhum · Bi anna dīnahumul muʿwajja lam yaqumi",
        en:"This, after their soothsayers had told the peoples that their crooked religion would not stand." },
      { ar:"وَبَعْدَمَا عَايَنُوا فِي الأُفْقِ مِنْ شُهُبٍ ۞ مُنْقَضَّةٍ وَفْقَ مَا فِي الأَرْضَ مِنْ صَنَمِ",
        tr:"Wa baʿda mā ʿāyanū fīl ufqi min shuhubin · Munqaḍḍatin wifqa mā fīl arḍi min ṣanami",
        en:"And after they beheld on the horizon shooting stars falling, matching the idols toppling on the earth." },
      { ar:"حَتَّى غَدَا عَنْ طَرِيقِ الْوَحْيِ مُنْهَزِمٌ ۞ مِنَ الشَّيَاطِينِ يَقْفُوا إِثْرَ مُنْهَزِمِ",
        tr:"Ḥattā ghadā ʿan ṭarīqil waḥyī munhazimun · Minash shayāṭīni yaqfū ithra munhazimi",
        en:"Until, from the path of revelation, one routed devil fled following upon another routed one." },
      { ar:"كَأَنَّهُمْ هَرَبًا أَبْطَالُ أَبْرَهَةٍ ۞ أَوْ عَسْكَرٍ بِالحَصَى مِنْ رَاحَتَيْهِ رُمِي",
        tr:"Ka annahum haraban abṭālu abrahatin · Aw ʿaskarin bil ḥaṣā min rāḥatayhi rumī",
        en:"In their flight they were like the champions of Abraha, or an army pelted with pebbles from his blessed hands." },
      { ar:"نَبْذًا بِهِ بَعْدَ تَسْبِيحٍ بِبَطْنِهِمَا ۞ نَبْذَ المُسَبِّحِ مِنْ أَحْشَاءِ مُلْتَقِمِ",
        tr:"Nabdhan bihi baʿda tasbīḥin bi baṭnihimā · Nabdhal musabbiḥi min aḥshāʾi multaqimi",
        en:"Cast out by his hands after they had glorified Allah within his palms, as the glorifier was cast from the belly of the whale." }
    ] },
  { titleArabic:"فِي مُعْجِزَاتِهِ ﷺ", titleEnglish:"5 · On His Miracles", video:"https://youtu.be/CnfY5RCWBi0?t=1479", verses:[
      { ar:"جَاءَتْ لِدَعْوَتِهِ الأَشْجَارُ سَاجِدَةً ۞ تَمْشِي إِلَيْهِ عَلَى سَاقٍ بِلاَ قَدَمِ",
        tr:"Jāʾat li daʿwatihil ashjāru sājidatan · Tamshī ilayhi ʿalā sāqin bilā qadami",
        en:"At his call the trees came prostrating, walking towards him upon trunks without feet." },
      { ar:"كَأَنَّمَا سَطَرَتْ سَطْرًا لِمَا كَتَبَتْ ۞ فُرُوعُهَا مِنْ بَدِيعِ الْخَطِّ بِاللَّقَمِ",
        tr:"Ka annamā saṭarat saṭran limā katabat · Furūʿuhā min badīʿil khaṭṭi bil laqami",
        en:"As if their branches, along the path, were tracing out a line of exquisite calligraphy." },
      { ar:"مِثْلَ الغَمَامَةِ أَنَّى سَارَ سَائِرَةً ۞ تَقِيهِ حَرَّ وَطِيسٍ لِلْهَجِيرِ حَمِي",
        tr:"Mithlal ghamāmati annā sāra sāʾiratan · Taqīhi ḥarra waṭīsin lil hajīri ḥamī",
        en:"Like the cloud that travelled wherever he went, shielding him from the blazing furnace of the noonday heat." },
      { ar:"أَقْسَمْتُ بِالْقَمَرِ المُنْشَقِّ إِنَّ لَهُ ۞ مِنْ قَلْبِهِ نِسْبَةً مَبْرُورَةَ القَسَمِ",
        tr:"Aqsamtu bil qamaril munshaqqi inna lahu · Min qalbihi nisbatan mabrūratal qasami",
        en:"I swear by the moon that was split in two — a true oath — that it bears a bond with his heart." },
      { ar:"وَمَا حَوَى الغَارُ مِنْ خَيْرٍ وَمِنْ كَرَمِ ۞ وَكُلُّ طَرْفٍ مِنَ الكُفَّارِ عَنْهُ عَمِي",
        tr:"Wa mā ḥawal ghāru min khayrin wa min karamin · Wa kullu ṭarfin minal kuffāri ʿanhu ʿamī",
        en:"And by the goodness and nobility the cave contained, while every disbeliever's eye was blind to him." },
      { ar:"فَالصِّدْقُ فِي الغَارِ وَالصِّدِّيقُ لَمْ يَرِمَا ۞ وَهُمْ يَقُولُونَ مَا بِالْغَارِ مِنْ أَرِمِ",
        tr:"Faṣ ṣidqu fīl ghāri waṣ ṣiddīqu lam yarimā · Wa hum yaqūlūna mā bil ghāri min arimi",
        en:"Truthfulness itself and the Truthful One never stirred from the cave, while they were saying, 'No living soul is within it.'" },
      { ar:"ظَنُّوا الحَمَامَ وَظَنُّوا الْعَنْكَبُوتَ عَلَى ۞ خَيْرِ الْبَرِيَّةِ لَمْ تَنْسُجْ وَلَمْ تَحُمِ",
        tr:"Ẓannul ḥamāma wa ẓannul ʿankabūta ʿalā · Khayril bariyyati lam tansuj wa lam taḥumi",
        en:"They imagined no dove had hovered, and no spider had woven its web, over the Best of Creation." },
      { ar:"وِقَايَةُ اللهِ أَغْنَتْ عَنْ مُضَاعَفَةٍ ۞ مِنَ الدُّرُوعِ وَعَنْ عَالٍ مِنَ الأُطُمِ",
        tr:"WiqāyatuLlāhi aghnat ʿan muḍāʿafatin · Minad durūʿi wa ʿan ʿālin minal uṭumi",
        en:"Allah's protection made them need no layered coats of mail, nor any towering fortress." },
      { ar:"مَا سَامَنِي الدَّهْرُ ضَيْمًا وَاسْتَجَرْتُ بِهِ ۞ إِلاَّ وَنِلْتُ جِوَارًا مِنْهُ لَمْ يُضَمِ",
        tr:"Mā sāmanid dahru ḍayman wastajartu bihi · Illā wa niltu jiwāran minhu lam yuḍami",
        en:"Never did fate impose some wrong on me and I sought refuge in him, but that I gained a sanctuary with him where no wrong could reach." },
      { ar:"وَلاَ الْتَمَسْتُ غِنَى الدَّارَيْنِ مِنْ يَدِهِ ۞ إِلاَّ اسْتَلَمْتُ النَّدَى مِنْ خَيْرِ مُسْتَلَمِ",
        tr:"Wa laltamastu ghinad dārayni min yadihi · Illāstalamtun nadā min khayri mustalami",
        en:"Nor did I seek the riches of both worlds from his hand but that I received bounty from the best of all to be approached." },
      { ar:"لاَ تُنْكِرِ الْوَحْيَ مِنْ رُؤْيَاهُ إِنَّ لَهُ ۞ قَلْبًا إِذَا نَامَتِ العَيْنَانِ لَمْ يَنَمِ",
        tr:"Lā tunkiril waḥya min ruʾyāhu inna lahu · Qalban idhā nāmatil ʿaynāni lam yanami",
        en:"Do not deny the revelation that came in his dreams — for he had a heart that did not sleep when the two eyes slept." },
      { ar:"وَذَاكَ حِينَ بُلُوغٍ مِنْ نُبَوَّتِهِ ۞ فَلَيْسَ يُنْكَرُ فِيهِ حَالُ مُحْتَلِمِ",
        tr:"Wa dhāka ḥīna bulūghin min nubuwwatihi · Fa laysa yunkaru fīhi ḥālu muḥtalimi",
        en:"That was at the onset of his prophethood; so the dreaming of one full-grown in it cannot be denied." },
      { ar:"تَبَارَكَ اللهُ مَا وَحَيٌ بِمُكْتَسَبٍ ۞ وَلاَ نَبيُّ عَلَى غَيْبٍ بِمُتَّهَمِ",
        tr:"Tabārak Allahu mā waḥyun bi muktasabin · Wa lā nabiyyun ʿalā ghaybin bi muttahami",
        en:"Blessed is Allah — revelation is not a thing acquired by effort, nor is a Prophet to be doubted concerning the Unseen." },
      { ar:"كَمْ أَبْرَأَتْ وَصِبًا بِاللَّمْسِ رَاحَتُهُ ۞ وَأَطْلَقَتْ أَرِبًا مِنْ رِبْقَةِ اللَّمَمِ",
        tr:"Kam abraʾat waṣiban bil lamsi rāḥatuhu · Wa aṭlaqat ariban min ribqatil lamami",
        en:"How many an invalid his palm healed with a touch, and how many it freed from the noose of madness!" },
      { ar:"وَأَحْيَتِ السَّنَةَ الشَّهْبَاءَ دَعْوَتُهُ ۞ حَتَّى حَكَتْ غُرَّةً فِي الأَعْصُرِ الدُّهُمِ",
        tr:"Wa aḥyatis sanatash shahbāʾa daʿwatuhu · Ḥattā ḥakat ghurratan fīl aʿṣurid duhumi",
        en:"His supplication revived the year of grey drought, till it shone out like a white blaze amid the dark ages." },
      { ar:"بِعَارضٍ جَادَ أَوْ خِلْتَ البِطَاحَ بِهَا ۞ سَيْبًا مِنَ اليَمِّ أَوْ سَيْلاً مِنَ العَرِمِ",
        tr:"Bi ʿāriḍin jāda aw khiltal biṭāḥa bihā · Sayban minal yammi aw saylan minal ʿarimi",
        en:"With a rain-cloud so generous you would think the valleys ran with a flow from the sea, or the bursting flood of ʿArim." }
    ] },
  { titleArabic:"فِي شَرَفِ الْقُرْآنِ وَمَدْحِهِ", titleEnglish:"6 · On the Nobility of the Qur'an", video:"https://youtu.be/CnfY5RCWBi0?t=1822", verses:[
      { ar:"دَعْنيِ وَوَصْفِي آيَاتٍ لَهُ ظَهَرَتْ ۞ ظُهُورَ نَارِ القِرَى لَيْلاً عَلَى عَلَمِ",
        tr:"Daʿnī wa waṣfī āyātin lahu ẓaharat · Ẓuhūra nāril qirā laylan ʿalā ʿalami",
        en:"Leave me to describe the signs made manifest through him — plain as a host's welcoming fire lit at night upon a hill." },
      { ar:"فَالدُّرُّ يَزْدَادُ حُسْنًا وَهْوَ مُنْتَظِمٌ ۞ وَلَيْسَ يَنْقُصُ قَدْرًا غَيْرَ مُنْتَظِمِ",
        tr:"Fad durru yazdādu ḥusnan wa huwa muntaẓimun · Wa laysa yanquṣu qadran ghayra muntaẓimi",
        en:"The pearl grows lovelier when strung in order, yet loses no worth when it is left unstrung." },
      { ar:"فَمَا تَطَاوُلُ آمَالِ المَديحِ إِلَى ۞ مَا فِيهِ مِنْ كَرَمِ الأَخْلاَقِ وَالشِّيَمِ",
        tr:"Famā taṭāwulu āmālil madīḥi ilā · Mā fīhi min karamil akhlāqi wash shiyami",
        en:"How could the aspirations of praise ever reach up to the nobility of character and disposition that is in him?" },
      { ar:"آيَاتُ حَقٍّ مِنَ الرَّحْمَانِ مُحْدَثَةٌ ۞ قَدِيمَةٌ صِفَةُ المَوْصُوفِ بِالقِدَمِ",
        tr:"Āyātu ḥaqqin minar raḥmāni muḥdathatun · Qadīmatun ṣifatul mawṣūfi bil qidami",
        en:"Signs of truth from the All-Merciful: new in their revealing, ancient as the attribute of Him described by pre-eternity." },
      { ar:"لَمْ تَقْتَرِنْ بِزَمِانٍ وَهْيَ تُخْبِرُنَا ۞ عَنْ المَعَادِ وَعَنْ عَادٍ وَعَنْ إِرَمِ",
        tr:"Lam taqtarin bizamānin wa hiya tukhbirunā · ʿAnil maʿādi wa ʿan ʿādin wa ʿan irami",
        en:"They are bound to no age, yet they tell us of the Return, and of ʿĀd, and of Iram." },
      { ar:"دَامَتْ لَدَيْنَا فَفَاقَتْ كُلَّ مُعْجِزَةٍ ۞ مِنَ النَّبِيِّينَ إِذْ جَاءَتْ وَلَمْ تَدُمِ",
        tr:"Dāmat ladaynā fafāqat kulla muʿjizatin · Minan nabiyyīna idh jāʾat wa lam tadumi",
        en:"They endure with us, and so surpass every miracle of the Prophets, which came and did not remain." },
      { ar:"مُحْكَّمَاتٌ فَمَا تُبْقِيْنَ مِنْ شُبَهٍ ۞ لِذِي شِقَاقٍ وَمَا تَبْغِيْنَ مِنْ حَكَمِ",
        tr:"Muḥkamātun famā tubqīna min shubahin · Lidhī shiqāqin wa mā tabghīna min ḥakami",
        en:"Verses so clear they leave no doubt for the contentious, and stand in need of no arbiter." },
      { ar:"مَا حُورِبَتْ قَطُّ إِلاَّ عَادَ مِنْ حَرَبٍ ۞ أَعْدَى الأَعَادِي إِلَيْهَا مُلْقِيَ السَّلَمِ",
        tr:"Mā ḥūribat qaṭṭu illā ʿāda min ḥarabin · Aʿdal aʿādī ilayhā mulqiyas salami",
        en:"Never were they assailed but that the fiercest of foes came back from the battle, laying down his arms in surrender to them." },
      { ar:"رَدَّتْ بَلاَغَتُهَا دَعْوَى مُعَارِضِهَا ۞ رَدَّ الغَيُورِ يَدَ الجَانِي عَنِ الْحُرَمِ",
        tr:"Raddat balāghatuhā daʿwā muʿāriḍihā · Raddal ghayūri yadal jānī ʿanil ḥurami",
        en:"Their eloquence repelled the claim of the challenger as a jealous man repels the aggressor's hand from his womenfolk." },
      { ar:"لَهَا مَعَانٍ كَمَوْجِ البَحْرِ فِي مَدَدٍ ۞ وَفَوْقَ جَوْهَرِهِ فِي الْحُسْنِ وَالقِيَمِ",
        tr:"Lahā maʿānin ka mawjil baḥri fī madadin · Wa fawqa jawharihi fīl ḥusni wal qiyami",
        en:"They hold meanings like the sea's waves in their surging, surpassing its pearls in beauty and in worth." },
      { ar:"فَمَا تُعَدُّ وَلاَ تُحْصَى عَجَائِبُهَا ۞ وَلاَ تُسَامُ عَلَى الإِكْثَارِ بِالسَّأَمِ",
        tr:"Famā tuʿaddu wa lā tuḥṣā ʿajāʾibuhā · Wa lā tusāmu ʿalal ikthāri bis saʾami",
        en:"Their wonders cannot be counted or numbered, nor does much repetition of them ever breed weariness." },
      { ar:"قَرَّتْ بِهَا عَيْنُ قَارِيْهَا فَقُلْتُ لَهُ ۞ لَقَدْ ظَفِرْتَ بِحَبْلِ اللهِ فَاعْتَصِمِ",
        tr:"Qarrat bihā ʿaynu qārīhā fa qultu lahu · Laqad ẓafirta bi ḥabliLlāhi faʿtaṣimi",
        en:"They delight the eye of their reciter, so I said to him: 'You have won the Rope of Allah, so hold fast to it.'" },
      { ar:"إِنْ تَتْلُهَا خِيفَةً مِنْ حَرَّ نَارِ لَظَى ۞ أَطْفَأْتَ حَرِّ لَظَىَ مِنْ وِرْدِهَا الشَّبِمِ",
        tr:"In tatluhā khīfatan min ḥarri nāri laẓā · Aṭfaʾta ḥarra laẓā min wirdihash shabimi",
        en:"If you recite them in fear of the heat of the blazing Fire, you quench that heat with their cool water." },
      { ar:"كَأَنَّهَا الحَوْضُ تَبْيَضُّ الوُجُوهُ بِهِ ۞ مِنَ العُصَاةِ وَقَدْ جَاءُوهُ كَالحُمَمِ",
        tr:"Ka annahal ḥawḍu tabyaḍḍul wujūhu bihi · Minal ʿuṣāti wa qad jāʾūhu kal ḥumami",
        en:"They are like the Pool at which the faces of sinners turn white, though they had come to it black as charcoal." },
      { ar:"وَكَالصِّرَاطِ وَكَالمِيزَانِ مَعْدِلَةً ۞ فَالقِسْطُ مِنْ غَيْرِهَا فِي النَّاسِ لَمْ يَقُمِ",
        tr:"Wa kaṣṣirāṭi wa kalmīzāni maʿdalatan · Falqisṭu min ghayrihā fin nāsi lam yaqumi",
        en:"And like the Bridge and like the Balance in justice — for without them true equity among people could not stand." },
      { ar:"لاَ تَعْجَبَنْ لِحَسُودٍ رَاحَ يُنْكِرُهَا ۞ تَجَاهُلاً وَهْوَ عَيْنُ الحَاذِقِ الفَهِمِ",
        tr:"Lā taʿjaban liḥasūdin rāḥa yunkiruhā · Tajāhulan wa huwa ʿaynul ḥādhiqil fahimi",
        en:"Do not wonder at an envier who goes on denying them, feigning ignorance while he is the very picture of the shrewd and discerning." },
      { ar:"قَدْ تُنْكِرُ الْعَيْنُ ضَوْءَ الشَّمْسِ مِنْ رَمَدٍ ۞ وَيُنْكِرُ الفَمُ طَعْمَ المَاءِ مِنْ سَقَمِ",
        tr:"Qad tunkirul ʿaynu ḍawʾash shamsi min ramadin · Wa yunkirul famu ṭaʿmal māʾi min saqami",
        en:"The eye may reject the light of the sun on account of inflammation, and the mouth may reject the taste of water on account of illness." }
    ] },
  { titleArabic:"فِي مِعْرَاجِهِ ﷺ", titleEnglish:"7 · On the Night Journey and Ascension", video:"https://youtu.be/CnfY5RCWBi0?t=2154", video2:"https://www.youtube.com/watch?v=pyjaFgnuESw", verses:[
      { ar:"يَا خَيْرَ مَنْ يَمَّمَ العّافُونَ سَاحَتَهُ ۞ سَعْيًا وَفَوْقَ مُتُونِ الأَيْنُقِ الرُّسُمِ",
        tr:"Yā Khayra man yammamal ʿāfūna sāḥatahu · Saʿyan wa fawqa mutūnil aynuqir rusumi",
        en:"O best of those to whose courtyard the seekers make their way — on foot and on the backs of sturdy, tireless she-camels!" },
      { ar:"وَمَنْ هُوَ الآيَةُ الكُبْرَى لِمُعْتَبِرٍ ۞ وَمَنْ هُوَ النِّعْمَةُ العُظْمَى لِمُغْتَنِمِ",
        tr:"Wa man huwal āyatul kubrā limuʿtabirin · Wa man huwan niʿmatul ʿuẓmā limughtanimi",
        en:"He who is the greatest sign for the one who reflects, and the supreme blessing for the one who would seize it." },
      { ar:"سَرَيْتَ مِنْ حَرَمٍ لَيْلاً إِلَى حَرَمٍ ۞ كَمَا سَرَى البَدْرُ فِي دَاجٍ مِنَ الظُّلَمِ",
        tr:"Sarayta min ḥaramin laylan ilā ḥaramin · Kamā saral badru fī dājin minaẓ ẓulami",
        en:"By night you journeyed from one sanctuary to another, as the full moon journeys through the deepest dark." },
      { ar:"وَبِتَّ تَرْقَى إِلَى أَنْ نِلْتَ مَنْزِلَةً ۞ مِنْ قَابِ قَوْسَيْنِ لَمْ تُدْرَكْ وَلَمْ تُرَمِ",
        tr:"Wa bitta tarqā ilā an nilta manzilatan · Min qābi qawsayni lam tudrak wa lam turami",
        en:"You rose all night until you reached a station 'two bows' length' away — never attained by any other, nor even aspired to." },
      { ar:"وَقَدَّمَتْكَ جَمِيعُ الأَنْبِيَاءِ بِهَا ۞ وَالرُّسْلِ تَقْدِيمَ مَخْدُومٍ عَلَى خَدَمِ",
        tr:"Wa qaddamatka jamīʿul anbiyāʾi bihā · War rusli taqdīma makhdūmin ʿalā khadami",
        en:"There all the Prophets and Messengers set you before them, as the one served is set before those who serve." },
      { ar:"وَأَنْتَ تَخْتَرِقُ السَّبْعَ الطِّبَاقَ بِهِمْ ۞ فِي مَوْكِبٍ كُنْتَ فِيهِ الصَّاحِبَ العَلَمِ",
        tr:"Wa anta takhtariqus sabʿaṭ ṭibāqa bihim · Fī mawkibin kunta fīhi ṣāhibal ʿalami",
        en:"And you passed through the seven heavens with them, in a procession in which you were the bearer of the banner." },
      { ar:"حَتَّى إِذَا لَمْ تَدَعْ شَأْوًا لِمُسْتَبِقٍ ۞ مِنَ الدُّنُوِّ وَلاَ مَرْقَى لِمُسْتَنِمِ",
        tr:"Ḥattā idhā lam tadaʿ shaʾwan limustabiqin · Minad dunuwwi wa lā marqan li mustanimi",
        en:"Until you left no goal of nearness for any who would race toward it, and no ascent for any who would climb." },
      { ar:"خَفَضْتَ كُلَّ مَقَامٍ بِالإِضَافَةٍ إِذْ ۞ نُودِيْتَ بِالرَّفْعِ مِثْلَ المُفْرَدِ العَلَمِ",
        tr:"Khafaḍta kulla maqāmin bil iḍāfati idh · Nūdīta bir rafʿi mithlal mufradil ʿalami",
        en:"You lowered every rank by comparison, when you were called up on high, like the single, matchless proper name." },
      { ar:"كَيْمَا تَفُوزَ بِوَصْلٍ أَيِّ مُسْتَتِرٍ ۞ عَنْ العُيُونِ وَسِرٍّ أَيِّ مُكْتَتَمِ",
        tr:"Kaymā tafūza biwaṣlin ayyi mustatirin · ʿAnil ʿuyūni wa sirrin ayyi muktatami",
        en:"So that you might attain a union — how hidden from all eyes! — and a secret — how deeply concealed!" },
      { ar:"فَحُزْتَ كُلَّ فَخَارٍ غَيْرَ مُشْتَرَكٍ ۞ وَجُزْتَ كُلَّ مَقَامٍ غَيْرَ مُزْدَحَمِ",
        tr:"Fa ḥuzta kulla fakhārin ghayra mushtarakin · Wa juzta kulla maqāmin ghayra muzdaḥami",
        en:"So you gained every glory, shared with none, and passed through every station, crowded by none." },
      { ar:"وَجَلَّ مِقْدَارُ مَا وُلِّيتَ مِنْ رُتَبٍ ۞ وَعَزَّ إِدْرَاكُ مَا أُولِيْتَ مِنْ نِعَمِ",
        tr:"Wa jalla miqdāru mā wullīta min rutabin · Wa ʿazza idrāku mā ūlīta min niʿami",
        en:"How immense the measure of the ranks you were given, and how far beyond grasp the blessings bestowed on you!" },
      { ar:"بُشْرَى لَنَا مَعْشَرَ الإِسْلَامِ إِنَّ لَنَا ۞ مِنَ العِنَايَةِ رُكْنًا غَيْرَ مُنْهَدِمِ",
        tr:"Bushrā lanā maʿsharal islāmi inna lanā · Minal ʿināyati ruknan ghayra munhadimi",
        en:"Glad tidings for us, O people of Islam: we have, through divine care, a pillar that will never fall." },
      { ar:"لَمَّا دَعَا اللهُ دَاعِينَا لِطَاعَتِهِ ۞ بِأَكْرَمِ الرُّسْلِ كُنَّا أَكْرَمَ الأُمَمِ",
        tr:"Lammā daʿāLlāhu dāʿīnā liṭāʿatihi · Bi akramir rusli kunna akramal umami",
        en:"When Allah called the one who calls us to His obedience the noblest of Messengers, we became the noblest of nations." }
    ] },
  { titleArabic:"فِي جِهَادِهِ ﷺ", titleEnglish:"8 · On His Campaigns and Striving", video:"https://youtu.be/CnfY5RCWBi0?t=2423", verses:[
      { ar:"رَاعَتْ قُلُوبَ الْعِدَا أَنْبَاءُ بِعْثَتِهِ ۞ كَنَبْأَةٍ أَجْفَلَتْ غُفْلاً مِنَ الْغَنَمِ",
        tr:"Rāʿat qulūbal ʿidā anbāʾu biʿthatihi · Kanabʾatin ajfalat ghuflan minal ghanami",
        en:"The tidings of his sending struck terror into the hearts of the enemies, like a sudden sound that scatters heedless sheep." },
      { ar:"مَا زَالَ يَلْقَاهُمُ فِي كُلِّ مُعْتَرَكٍ ۞ حَتَّى حَكَوْا بِالْقَنَا لَحْمًا عَلَى وَضَمِ",
        tr:"Mā zāla yalqāhumu fī kulli muʿtarakin · Ḥattā ḥakaw bil qanā laḥman ʿalā waḍami",
        en:"He kept meeting them on every field of battle, until the spears left them like meat on a butcher's block." },
      { ar:"وَدُّوا الفِرَارَ فَكَادُوا يَغْبِطُونَ بِهِ ۞ أَشْلاَءَ شَالَتْ مَعَ الْعِقْبَانِ وَالرَّخَمِ",
        tr:"Waddul firāra fakādū yaghbiṭūna bihi · Ashlāʾa shālat maʿal ʿiqbāni war rakhami",
        en:"They longed to flee, till they almost envied the torn limbs borne aloft by the eagles and the vultures." },
      { ar:"تَمْضِي اللَّيَالِي وَلاَ يَدْرُونَ عِدَّتَهَا ۞ مَا لَمْ تَكُنْ مِنْ لَيَالِي الأَشْهُرِ الْحُرُمِ",
        tr:"Tamḍil layālī wa lā yadrūna ʿiddatahā · Mā lam takun min layālil ash-huril ḥurumi",
        en:"The nights passed and they could not reckon their number — unless they were nights of the Sacred Months." },
      { ar:"كَأَنَّمَا الدِّينُ ضَيْفٌ حَلَّ سَاحَتَهُمْ ۞ بِكُلِّ قَرْمٍ إِلَى لَحْمِ العِدَا قَرِمِ",
        tr:"Ka annamad dīnu ḍayfun ḥalla sāḥatahum · Bi kulli qarmin ilā laḥmil ʿidā qarimi",
        en:"As if the Religion were a guest that alighted in their courtyard, borne by every chieftain hungry for the flesh of the foe." },
      { ar:"يَجُرُّ بَحْرَ خَمِيسٍ فَوْقَ سَابِحَةٍ ۞ يَرْمِى بِمَوْجٍ مِنَ الأَبْطَالِ مُلْتَطِمِ",
        tr:"Yajurru baḥra khamīsin fawqa sābiḥatin · Yarmī bi mawjin minal abṭāli multaṭimi",
        en:"Leading a sea of soldiers upon swift steeds, casting forth wave upon crashing wave of heroes." },
      { ar:"مِنْ كُلِّ مُنْتَدَبٍ لِلهِ مُحْتَسِبٍ ۞ يَسْطُو بِمُسْتَأْصِلٍ لِلكُفْرِ مُصْطَلِمِ",
        tr:"Min kulli muntadabin liLlāhi muḥtasibin · Yasṭū bimustaʾṣilin lil kufri muṣṭalimi",
        en:"Every one of them answering Allah's call and seeking His reward, striking to uproot disbelief and wipe it out." },
      { ar:"حَتىَّ غَدَتْ مِلَّةُ الإِسْلاَمِ وَهْيَ بِهِمْ ۞ مِنْ بَعْدِ غُرْبَتِهَا مَوْصُولَةَ الرَّحِمِ",
        tr:"Ḥatta ghadat millatul islāmi wahya bihim · Min baʿdi ghurbatihā mawṣūlatar rahimi",
        en:"Until, through them, the community of Islam became — after its estrangement — a kinship rejoined." },
      { ar:"مَكْفُولَةً أَبَدًا مِنْهُمْ بِخَيْرِ أَبٍ ۞ وَخَيْرِ بَعْلٍ فَلَمْ تَيْتَمْ وَلَمْ تَئِمِ",
        tr:"Makfūlatan abadan minhum bi khayri abin · Wa khayri baʿlin fa lam taytam wa lam taʾimi",
        en:"Forever safeguarded by them, through the best of fathers and the best of husbands, so it was neither orphaned nor widowed." },
      { ar:"هُمُ الجِبَالُ فَسَلْ عَنْهُمْ مُصَادِمَهُمْ ۞ مَاذَا رَأَى مِنْهُمُ فِي كُلِّ مُصْطَدَمِ",
        tr:"Humul jibālu fasal ʿanhum muṣādimahum · Mādhā raʾā minhumu fī kulli muṣṭadami",
        en:"They were mountains — so ask of them the one who clashed with them what he witnessed of them in every collision." },
      { ar:"وَسَلْ حُنَيْنًا وَسَلْ بَدْرًا وَسَلْ أُحُدًا ۞ فُصُولَ حَتْفٍ لَهُمْ أَدْهَى مِنَ الوَخَمِ",
        tr:"Wa sal ḥunaynan wa sal badran wa sal uḥudan · Fuṣūla ḥatfin lahum adʾhā minal wakhami",
        en:"Ask Ḥunayn, and ask Badr, and ask Uḥud — seasons of death for them, more grievous than any plague." },
      { ar:"المُصْدِرِي البِيضِ حُمْرًا بَعْدَ مَا وَرَدَتْ ۞ مِنَ العِدَا كُلَّ مُسْوَدٍّ مِنَ اللِّمَمِ",
        tr:"Almuṣdiril bīḍi ḥumran baʿda mā waradat · Minal ʿidā kulla muswaddin minal limami",
        en:"They drew back their white blades stained red, after they had gone in among the enemy's every dark head of hair." },
      { ar:"وَالكَاتِبِينَ بِسُمْرِ الخَطِّ مَا تَرَكَتْ ۞ أَقْلاَمُهُمْ حَرْفَ جِسْمٍ غَيْرَ مُنَعَجِمِ",
        tr:"Wal kātibīna bi sumril khaṭṭi mā tarakat · Aqlāmuhum ḥarfa jismin ghayra munʿajimi",
        en:"Writing with the brown shafts of their spears, their pens left no letter of a body without its mark." },
      { ar:"شَاكِي السِّلاَحِ لَهُمْ سِيمَا تُمَيِّزُهُمْ ۞ وَالوَرْدُ يَمْتَازُ بِالسِّيمَا عَنِ السَّلَمِ",
        tr:"Shākis silāḥi lahum sīmā tumayyizuhum · Wal wardu yamtāzu bis sīmā ʿanis salami",
        en:"Fully armed, they bore a mark that set them apart — as the rose is set apart by its mark from the acacia." },
      { ar:"تُهْدِي إِلَيْكَ رِيَاحُ النَّصْرِ نَشْرَهُمُ ۞ فَتَحْسَبُ الزَّهْرَ فِي الأَكْمَامِ كُلَّ كَمِي",
