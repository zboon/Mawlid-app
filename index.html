        tr:"Fī tartībi tarkībi hādhihil-qawālib",
        en:"in the ordered fashioning and assembly of these forms:" },
      { ar:"خَلَقَ مُخًّا وَعِظْمًا وَعَضُدًا وَعُرُوقًا وَلَحْمًا وَجِلْدًا وَشَعْرًا وَدَمًا بِنَظْمٍ مُؤْتَلِفٍ مُتَرَاكِبْ",
        tr:"Khalaqa mukhkhan wa ʿaẓman wa ʿaḍudan wa ʿurūqan wa laḥman wa jildan wa shaʿran wa daman bi-naẓmin muʾtalifin mutarākib",
        en:"He created the marrow, the bone, the upper arm, the veins, the flesh, the skin, the hair and the blood, in an intricately harmonious, interlocking order," },
      { ar:"مِنْ مَاءٍ دَافِقٍ يَخْرُجُ مِنْ بَيْنِ الصُّلْبِ وَالتَّرَائِبْ",
        tr:"Min māʾin dāfiqin yakhruju min bayniṣ-ṣulbi wat-tarāʾib",
        en:"from a gushing fluid issuing from between the backbone and the ribs." },
      { ar:"لَا إِلَهَ إِلَّا الله ۞ كَرِيمٌ بَسَطَ لِخَلْقِهِ بِسَاطَ كَرَمِهِ وَالمَوَاهِبْ",
        tr:"Lā ilāha illa-Llāh · Karīmun basaṭa li-khalqihi bisāṭa karamihi wal-mawāhib",
        en:"There is no god but Allah — the Generous, who spread out for His creation a carpet of His bounty and gifts." },
      { ar:"يَنْزِلُ فِي كُلِّ لَيْلَةٍ إِلَى السَّمَاءِ الدُّنْيَا وَيُنَادِيْ هَلْ مِنْ مُسْتَغْفِرٍ هَلْ مِنْ تَائِبْ ۞ تَائِبُونَ إِلَى الله",
        tr:"Yanzilu fī kulli laylatin ilas-samāʾid-dunyā wa yunādī hal min mustaghfirin hal min tāʾib · Tāʾibūna ila-Llāh",
        en:"He descends each night to the lowest heaven and calls: 'Is there any seeking forgiveness? Is there any who repents?' (We turn in repentance to Allah.)" },
      { ar:"هَلْ مِنْ طَالِبِ حَاجَةٍ فَأُنِيلُهُ الْمَطَالِبْ",
        tr:"Hal min ṭālibi ḥājatin fa-unīluhul-maṭālib",
        en:"'Is there any who has a need, that I may grant him what he seeks?'" },
      { ar:"فَلَوْ رَأَيْتَ الخُدَّامَ قِيَامًا عَلَى الأَقْدَامِ وَقَدْ جَادُوا بِالدُّمُوعِ السَّوَاكِبْ",
        tr:"Fa-law raʾaytal-khuddāma qiyāman ʿalal-aqdāmi wa qad jādū bid-dumūʿis-sawākib",
        en:"Were you to see the servants standing upon their feet, pouring forth streaming tears," },
      { ar:"وَالقَوْمَ بَينَ نَادِمٍ وَتَائِبٍ",
        tr:"Wal-qawma bayna nādimin wa tāʾib",
        en:"the people between remorse and repentance," },
      { ar:"وَخَائِفٍ لِنَفْسِهِ يُعَاتِبْ",
        tr:"Wa khāʾifin li-nafsihi yuʿātib",
        en:"and fearful for himself, reproaching his own soul," },
      { ar:"وَآبِقٍ مِنَ الذُّنُوبِ إِلَيهِ هَارِبْ",
        tr:"Wa ābiqin minadh-dhunūbi ilayhi hārib",
        en:"and fleeing from his sins, taking refuge in Him," },
      { ar:"فَلَا يَزَالُونَ فِيْ الاسْتِغْفَارِ حَتَّىْ يَكُفَّ كَفُّ النَّهَارِ ذُيُولَ الغَيَاهِبْ",
        tr:"Fa-lā yazālūna fil-istighfāri ḥattā yakuffa kaffun-nahāri dhuyūlal-ghayāhib",
        en:"they remain in seeking forgiveness until the hand of daylight draws back the trailing skirts of darkness." },
      { ar:"فَيَعُودُونَ وَقَدْ فَازُوا بِالْمَطْلُوبِ وَأَدْرَكُوا رِضَىْ الْمَحْبُوبِ وَلَمْ يَعُدْ أَحَدٌ مِنَ القَومِ وَهُوَ خَائِبْ",
        tr:"Fa-yaʿūdūna wa qad fāzū bil-maṭlūbi wa adrakū riḍal-maḥbūbi wa lam yaʿud aḥadun minal-qawmi wa huwa khāʾib",
        en:"So they return, having won what they sought and attained the pleasure of the Beloved, and not one of them turns back disappointed." },
      { ar:"لَا إِلَهَ إِلَّا الله ۞ فَسُبْحَانَهُ تَعَالَىْ مِنْ مَلِكٍ أَوْجَدَ نُوْرَ نَبِيِّهِ مُحَمَّدٍ ﷺ مِنْ نُورِهِ قَبْلَ أَنْ يَخْلُقَ آدَمَ مِنَ الطِّينِ اللَّازِبْ",
        tr:"Lā ilāha illa-Llāh · Fa-subḥānahu taʿālā min malikin awjada nūra nabiyyihi Muḥammadin ﷺ min nūrihi qabla an yakhluqa Ādama minaṭ-ṭīnil-lāzib",
        en:"There is no god but Allah — glory to Him, exalted King, who brought the light of His Prophet Muhammad ﷺ into being from His own light, before He created Adam from clinging clay." },
      { ar:"وَعَرَضَ فَخْرَهُ عَلَىْ الأَشْيَاءِ وَقَالَ هَذَا سَيِّدُ الأَنْبِيَاءِ وَأَجَلُّ الأَصْفِيَاءِ وَأَكْرَمُ الْحَبَايِبْ",
        tr:"Wa ʿaraḍa fakhrahu ʿalal-ashyāʾi wa qāla hādhā sayyidul-anbiyāʾi wa ajallul-aṣfiyāʾi wa akramul-ḥabāʾib",
        en:"And He presented His pride before all things and said: 'This is the master of the prophets, the most exalted of the chosen, and the most honoured of the beloved.'" },
      { refrain:true, ar:"اللّٰهُمَّ صَلِّ وَسَلِّمْ وَبَارِكْ عَلَيْهِ وَعَلَى آلِهْ",
        tr:"Allāhumma ṣalli wa sallim wa bārik ʿalayhi wa ʿalā ālih",
        en:"O Allah, bless him, grant him peace, and pour Your blessings upon him and his family." }
    ] },
  { titleArabic:"مَنْ هُوَ؟", titleEnglish:"5 · Who is He?", verses:[
      { ar:"قِيْلَ هُوَ آدَمُ عَلَيْهِ السَّلَامْ ۞ قَالَ آدَمُ بِهِ أُنِيْلُهُ أَعْلَى الْمَرَاتِبْ",
        tr:"Qīla huwa Ādam ʿalayhis-salām · Qāla Ādamu bihi unīluhu aʿlal-marātib",
        en:"It was asked: 'Is he Adam, upon him be peace?' He said: 'Because of him I grant Adam the highest of ranks.'" },
      { ar:"قِيلَ هُوَ نُوحٌ عَلَيْهِ السَّلَامْ ۞ قَالَ نُوْحٌ بِهِ يَنْجُو مِنَ الْغَرَقِ وَيَهْلَكُ مَن خَالَفَهُ مِنَ الأَهْلِ وَالأَقَارِبْ",
        tr:"Qīla huwa Nūḥ ʿalayhis-salām · Qāla Nūḥun bihi yanjū minal-gharaqi wa yahlaku man khālafahu minal-ahli wal-aqārib",
        en:"It was asked: 'Is he Nuh, upon him be peace?' He said: 'Through him Nuh is saved from drowning, while those who oppose him, whether kin or close relations, perish.'" },
      { ar:"قِيلَ هُوَ إِبْرَاهِيْمُ عَلَيْهِ السَّلَامْ ۞ قَالَ إِبْرَاهِيمُ بِهِ تَقُوْمُ حُجَّتُهُ عَلَى عُبَّادِ الأَصْنَامِ وَالْكَوَاكِبْ",
        tr:"Qīla huwa Ibrāhīm ʿalayhis-salām · Qāla Ibrāhīmu bihi taqūmu ḥujjatuhu ʿalā ʿubbādil-aṣnāmi wal-kawākib",
        en:"It was asked: 'Is he Ibrahim, upon him be peace?' He said: 'Through him Ibrahim's proof stands against the worshippers of idols and stars.'" },
      { ar:"قِيلَ هُوَ مُوسَى عَلَيْهِ السَّلَامْ ۞ قَالَ مُوسَى أَخُوهُ وَلَكِنَّ هَذَا حَبِيبٌ وَمُوسَى كَلِيمٌ وَمُخَاطَبْ",
        tr:"Qīla huwa Mūsā ʿalayhis-salām · Qāla Mūsā akhūhu wa lākinna hādhā ḥabībun wa Mūsā kalīmun wa mukhāṭab",
        en:"It was asked: 'Is he Musa, upon him be peace?' He said: 'Musa is his brother, but this one is the Beloved, while Musa is the one addressed and spoken to.'" },
      { ar:"قِيلَ هُوَ عِيسَى عَلَيْهِ السَّلَامْ ۞ قَالَ عِيْسَى يُبَشِّرُ بِهِ وَهُوَ بَيْنَ يَدَيْ نُبُوَّتِهِ كَالْحَاجِبْ",
        tr:"Qīla huwa ʿĪsā ʿalayhis-salām · Qāla ʿĪsā yubashshiru bihi wa huwa bayna yaday nubuwwatihi kal-ḥājib",
        en:"It was asked: 'Is he ʿIsa, upon him be peace?' He said: 'ʿIsa heralds his coming; he stands before his prophethood like a herald announcing him.'" },
      { ar:"قِيلَ فَمَنْ هَذَا الْحَبِيْبُ الكَرِيْمُ الَّذِي أَلْبَسْتَهُ حُلَّةَ الْوَقَارِ، وَتَوَّجْتَهُ بِتِيجَانِ الْمَهَابَةِ وَالِافْتِخَارْ، وَنَشَرْتَ عَلَى رَأْسِهِ الْعَصَائِبْ",
        tr:"Qīla faman hādhal-ḥabībul-karīmul-ladhī albastahu ḥullatal-waqār, wa tawwajtahu bi-tījānil-mahābati wal-iftikhār, wa nasharta ʿalā raʾsihil-ʿaṣāʾib",
        en:"It was asked: 'Then who is this noble beloved whom You have clothed in the robe of dignity, crowned with the crowns of awe and pride, and over whose head You have unfurled the banners?'" },
      { ar:"قَالَ هُوَ نَبِيٌّ اسْتَخَرْتُهُ مِنْ لُؤَيِّ بن غَالِبْ",
        tr:"Qāla huwa nabiyyun-istakhartuhu min Luʾayyi bni Ghālib",
        en:"He said: 'He is a prophet whom I have chosen from the line of Luʾayy ibn Ghalib.'" },
      { ar:"يَمُوْتُ أَبُوْهُ وَأُمُّهُ وَيَكْفُلُهُ جَدُّهُ ثُمَّ عَمُّهُ الشَّقِيْقُ أَبُو طَالِبْ",
        tr:"Yamūtu abūhu wa ummuhu wa yakfuluhu jadduhu thumma ʿammuhush-shaqīqu Abū Ṭālib",
        en:"His father and mother will pass away; his grandfather will take charge of him, then his full paternal uncle Abu Talib." },
      { refrain:true, ar:"اللّٰهُمَّ صَلِّ وَسَلِّمْ وَبَارِكْ عَلَيْهِ وَعَلَى آلِهْ",
        tr:"Allāhumma ṣalli wa sallim wa bārik ʿalayhi wa ʿalā ālih",
        en:"O Allah, bless him, grant him peace, and pour Your blessings upon him and his family." }
    ] },
  { titleArabic:"وَصْفُهُ الشَّرِيفُ ﷺ", titleEnglish:"6 · The Prophet's Blessed Description", verses:[
      { ar:"يُبْعَثُ مِنْ تِهَامَةَ، بَيْنَ يَدَيِ الْقِيَامَةْ، فِيْ ظَهْرِهِ عَلامَةٌ، تُظِلُّهُ الْغَمَامَةُ تُطِيعُهُ السَّحَائِبْ",
        tr:"Yubʿathu min tihāmah, bayna yadayil-qiyāmah, fī ẓahrihi ʿalāmah, tuẓilluhul-ghamāmatu tuṭīʿuhus-saḥāʾib",
        en:"He will be sent forth from Tihama, just before the Day of Resurrection; on his back is a mark; the cloud shades him and the rain-clouds obey him." },
      { ar:"فَجْرِيُّ الْجَبِيْنِ لَيْلِيُّ الذَّوَائِبْ",
        tr:"Fajriyyul-jabīni layliyyudh-dhawāʾib",
        en:"His brow is like the dawn, and his flowing locks are like the night." },
      { ar:"أَلِفِيُّ الأَنْفِ مِيْمِيُّ الْفَمِ نُونِيُّ الْحَاجِبْ",
        tr:"Alifiyyul-anfi mīmiyyul-fami nūniyyul-ḥājib",
        en:"His nose is shaped like the letter Alif, his mouth like the Mim, and his eyebrows like the Nun." },
      { ar:"سَمْعُهُ يَسْمَعُ صَرِيْرَ الْقَلَمِ، بَصَرُهُ إِلَى السَّبْعِ الطِّبَاقِ ثَاقِبْ",
        tr:"Samʿuhu yasmaʿu ṣarīral-qalam, baṣaruhu ilas-sabʿiṭ-ṭibāqi thāqib",
        en:"His hearing perceives the scratching of the Pen; his sight pierces through the seven heavens." },
      { ar:"قَدَمَاهُ قَبَّلَهُمَا الْبَعِيرُ فَأَزَالَا مَا اشْتَكَاهُ مِنَ الْمِحَنِ وَالنَّوَائِبْ",
        tr:"Qadamāhu qabbalahumal-baʿīru fa-azālā mash-takāhu minal-miḥani wan-nawāʾib",
        en:"His two feet — the camel kissed them, and they removed the trials and hardships of which it had complained." },
      { ar:"آمَنَ بِهِ الضَّبُّ وَسَلَّمَت عَلَيهِ الأَشْجَارُ وَخَاطَبَتْهُ الأَحْجَارُ وَحَنَّ إِلَيْهِ الْجِذْعُ حَنِينَ حَزِيْنٍ نَادِبْ",
        tr:"Āmana bihiḍ-ḍabbu wa sallamat ʿalayhil-ashjāru wa khāṭabat-hul-aḥjāru wa ḥanna ilayhil-jidhʿu ḥanīna ḥazīnin nādib",
        en:"The lizard believed in him, the trees greeted him with peace, the stones spoke to him, and the palm-trunk yearned for him with the yearning of one grieving and lamenting." },
      { ar:"يَدَاهُ تَظْهَرُ بَرَكَتُهُمَا فِيْ الْمَطَاعِمِ وَالْمَشَارِبْ",
        tr:"Yadāhu taẓharu barakatuhumā fil-maṭāʿimi wal-mashārib",
        en:"His two hands — their blessing shows itself in food and in drink." },
      { ar:"قَلْبُهُ لا يَغْفُلُ وَلا يَنَامُ وَلَكِن لِلْخِدْمَةِ عَلَى الدَّوَامِ مُرَاقِبْ",
        tr:"Qalbuhu lā yaghfulu wa lā yanāmu wa lākin lil-khidmati ʿalad-dawāmi murāqib",
        en:"His heart is never heedless and never sleeps; rather it is ever watchful, in constant devoted service." },
      { ar:"إِنْ أُوذِيَ يَعْفُوْ وَلا يُعَاقِبْ",
        tr:"In ūdhiya yaʿfū wa lā yuʿāqib",
        en:"When he is harmed, he pardons and does not punish." },
      { ar:"وَإِنْ خُوصِمَ يَصْمُتُ وَلا يُجَاوِبْ",
        tr:"Wa in khūṣima yaṣmutu wa lā yujāwib",
        en:"When he is quarrelled with, he keeps silent and does not retort." },
      { ar:"أَرْفَعُهُ إِلَى أَشْرَفِ الْمَرَاتِبْ",
        tr:"Arfaʿuhu ilā ashrafil-marātib",
        en:"[Allah says:] I raise him to the noblest of ranks," },
      { ar:"فِيْ رَكْبَةٍ لا تَنْبَغِيْ قَبْلَهُ وَلا بَعْدَهُ لِرَاكِبْ",
        tr:"Fī rakbatin lā tanbaghī qablahu wa lā baʿdahu li-rākib",
        en:"upon a mount befitting no rider before him or after him," },
      { ar:"فِيْ مَوْكِبٍ مِنَ الْمَلائِكَةِ يَفُوْقُ عَلَى سَائِرِ الْمَواكِبْ",
        tr:"Fī mawkibin minal-malāʾikati yafūqu ʿalā sāʾiril-mawākib",
        en:"in a procession of angels surpassing every other procession." },
      { ar:"فَإِذَا ارْتَقَىْ عَلَى الْكَوْنَيْنِ وَانْفَصَلَ عَنِ الْعَالَمَيْنِ كُنتُ لَهُ أَنَا النَّدَيْمَ وَالْمُخَاطِبْ",
        tr:"Fa-idhar-taqā ʿalal-kawnayni wan-faṣala ʿanil-ʿālamayni kuntu lahu anan-nadīma wal-mukhāṭib",
        en:"And when he rises above the two worlds and parts from the two realms, I Myself am his companion and the One who speaks with him." },
      { ar:"ثُمَّ أَرُدُّهُ مِنَ الْعَرْشِ قَبْلَ أَنْ يَبْرُدَ الْفَرْشُ وَقَدْ نَالَ جَمِيعَ الْمَآرِبْ",
        tr:"Thumma arudduhu minal-ʿarshi qabla an yabrudal-farshu wa qad nāla jamīʿal-māʾrib",
        en:"Then I return him from the Throne before his bed grows cold, having attained all his desires." },
      { ar:"فَإِذَا شُرِّفَتْ تُرْبَةُ طَيْبَةَ مِنْهُ بِأَشْرَفِ قَالِبْ",
        tr:"Fa-idhā shurrifat turbatu Ṭaybata minhu bi-ashrafi qālib",
        en:"And when the soil of Tayba is ennobled by his most noble form," },
      { ar:"سَعَتْ إِلَيْهِ أَرْوَاحُ الْمُحِبِّيْنَ عَلَى الأَقْدَامِ وَالنَّجَائِبْ",
        tr:"Saʿat ilayhi arwāḥul-muḥibbīna ʿalal-aqdāmi wan-najāʾib",
        en:"the souls of the lovers hasten to him, some on foot and some upon swift camels." },
      { refrain:true, ar:"اللّٰهُمَّ صَلِّ وَسَلِّمْ وَبَارِكْ عَلَيْهِ وَعَلَى آلِهْ",
        tr:"Allāhumma ṣalli wa sallim wa bārik ʿalayhi wa ʿalā ālih",
        en:"O Allah, bless him, grant him peace, and pour Your blessings upon him and his family." }
    ] },
  { titleArabic:"نَسَبُهُ الطَّاهِرُ ﷺ", titleEnglish:"9 · His Pure Ancestry", verses:[
      { ar:"أَوَّلُ مَا نَسْتَفْتِحُ بِإِيرَادِ حَدِيثَيْنِ وَرَدَا فِيْ نَبِيٍّ كَانَ قَدْرُهُ عَظِيمًا ۞ وَنَسَبُهُ كَرِيمًا ۞ وَصِرَاطُهُ مُسْتَقِيمًا",
        tr:"Awwalu mā nastaftiḥu bi-īrādi ḥadīthayni waradā fī nabiyyin kāna qadruhu ʿaẓīmā · wa nasabuhu karīmā · wa ṣirāṭuhu mustaqīmā",
        en:"We begin by presenting two narrations that came concerning a Prophet whose worth was immense, whose lineage was noble, and whose path was straight." },
      { ar:"قَالَ فِيْ حَقِّهِ مَنْ لَمْ يَزَلْ سَمِيعًا عَلِيمًا. إِنَّ اللهَ وَمَلائِكَتَهُ يُصَلُّونَ عَلَى النَّبِيْ ۞ يَا أَيُّهَا الَّذِينَ آمَنُوا صَلُّوا عَلَيْهِ وَسَلِّمُوا تَسْلِيمًا",
        tr:"Qāla fī ḥaqqihi man lam yazal samīʿan ʿalīmā. Inna-Llāha wa malāʾikatahu yuṣallūna ʿalan-nabiyy · yā ayyuhal-ladhīna āmanū ṣallū ʿalayhi wa sallimū taslīmā",
        en:"He who is ever All-Hearing and All-Knowing said of him: 'Truly Allah and His angels send blessings upon the Prophet. O you who believe, send blessings upon him and greet him with a worthy greeting of peace.'" },
      { ar:"الْحَدِيثُ الأَوَّلُ عَنْ بَحْرِ الْعِلمِ الْدَّافِقِ، وَلِسَانِ الْقُرْآنِ النَّاطِقْ، أَوْحَدِ عُلَمَاءِ النَّاسِ، سَيِّدِنَا عَبْدُ اللّٰهِ ابْنِ سَيِّدِنَا العَبَّاسْ رَضِيَ اللّٰهُ عَنْهُمَا، عَنْ سَيِّدِنَا رَسُولِ اللّٰهِ ﷺ أَنَّهُ قَالَ: إِنَّ قُرَيشًا كَانَتْ نُوْرًا بَيْنَ يَدَيْ الله عَزَّ وَجَلَّ قَبْلَ أَنْ يَخْلُقَ آدَمَ عَلَيهِ السَّلَامُ بِأَلْفَيْ عَامٍ، يُسَبِّحُ اللهَ ذَلِكَ النُورُ وَتُسَبِّحُ الْمَلَائِكَةُ بِتَسْبِيحِهْ",
        tr:"Al-ḥadīthul-awwalu ʿan baḥril-ʿilmid-dāfiq, wa lisānil-qurʾānin-nāṭiq, awḥadi ʿulamāʾin-nās, sayyidinā ʿAbdi-Llāhi bni sayyidinal-ʿAbbās raḍiya-Llāhu ʿanhumā, ʿan sayyidinā rasūli-Llāhi ﷺ annahu qāl: inna Qurayshan kānat nūran bayna yadayi-Llāhi ʿazza wa jalla qabla an yakhluqa Ādama ʿalayhis-salāmu bi-alfay ʿām, yusabbiḥu-Llāha dhālikan-nūru wa tusabbiḥul-malāʾikatu bi-tasbīḥih",
        en:"The first narration is from the gushing ocean of knowledge and the speaking tongue of the Qur'an, the foremost of scholars, our master ʿAbdullah son of our master al-ʿAbbas (may Allah be pleased with them both), from the Messenger of Allah ﷺ, who said: 'Quraysh was a light before Allah, Mighty and Majestic, two thousand years before He created Adam, upon him be peace. That light glorified Allah, and the angels glorified with its glorification.'" },
      { ar:"قَالَ ﷺ فَأَهْبَطَنِيَ اللهُ عَزَّ وَجَلَّ فِيْ ظَهْرِ آدَمَ عَلَيهِ السَّلَامْ",
        tr:"Qāla ﷺ fa-ahbaṭaniya-Llāhu ʿazza wa jalla fī ẓahri Ādama ʿalayhis-salām",
        en:"He ﷺ said: 'Then Allah, Mighty and Majestic, sent me down into the loins of Adam, upon him be peace.'" },
      { ar:"وَحَمَلَنِي فِي السَّفِينَةِ فِي صُلْبِ نُوحٍ عَلَيهِ السَّلَامُ",
        tr:"Wa ḥamalanī fis-safīnati fī ṣulbi Nūḥin ʿalayhis-salām",
        en:"'And He carried me in the ark in the loins of Nuh, upon him be peace.'" },
      { ar:"وَجَعَلَنِي فِي صُلبِ الْخَلِيلِ إِبرَاهِيمَ عَلَيهِ السَّلامُ حِينَ قُذِفَ بِهِ فِي النَّارِ",
        tr:"Wa jaʿalanī fī ṣulbil-khalīli Ibrāhīma ʿalayhis-salāmu ḥīna qudhifa bihi fin-nār",
        en:"'And He placed me in the loins of the Friend, Ibrahim, upon him be peace, when he was cast into the fire.'" },
      { ar:"وَلَمْ يَزَلِ اللهُ عزَّ وَجَلَّ يَنقُلُنِي مِنَ الأَصْلابِ الطَّاهِرَةِ إِلَى الأَرحَامِ الزَّكِيَّةِ الفَاخِرَةِ، حَتَّىْ أَخْرَجَنِيَ اللهُ مِنْ بَينِ أَبَوَيَّ وَهُمَا لَمْ يَلتَقِيَا عَلَى سِفَاحٍ قَطُّ",
        tr:"Wa lam yazali-Llāhu ʿazza wa jalla yanqulunī minal-aṣlābiṭ-ṭāhirati ilal-arḥāmiz-zakiyyatil-fākhirah, ḥattā akhrajaniya-Llāhu min bayni abawayya wa humā lam yaltaqiyā ʿalā sifāḥin qaṭṭ",
        en:"'And Allah, Mighty and Majestic, kept moving me from pure loins to noble, purified wombs, until He brought me forth from between my parents, and never did they come together in anything unlawful.'" },
      { refrain:true, ar:"اللّٰهُمَّ صَلِّ وَسَلِّمْ وَبَارِكْ عَلَيْهِ وَعَلَى آلِهْ",
        tr:"Allāhumma ṣalli wa sallim wa bārik ʿalayhi wa ʿalā ālih",
        en:"O Allah, bless him, grant him peace, and pour Your blessings upon him and his family." }
    ] },
  { titleArabic:"البِشَارَةُ بِمُلْكِ النُّبُوَّةِ", titleEnglish:"10 · The Biblical Prediction of the Prophetic Kingdom", verses:[
      { ar:"الْحَدِيثُ الثَّانِيْ عَنْ عَطَاءِ بن يَسَار عَنْ كَعبِ الأَحبَارِ، قَالَ عَلَّمَنِيَ أَبِيَ التَّورَاةَ إِلَّا يَحْتِمُهُ وَيُدخِلُهُ الصُّندُوقْ",
        tr:"Al-ḥadīthuth-thānī ʿan ʿAṭāʾi bni Yasār ʿan Kaʿbil-Aḥbār, qāla ʿallamaniya abiyal-tawrāta illā sifran wāḥidan kāna yakhtimuhu wa yudkhiluhuṣ-ṣundūq",
        en:"The second narration is from ʿAta ibn Yasar, from Kaʿb al-Ahbar, who said: 'My father taught me the Torah, except for one scroll that he used to seal and keep locked away in a box.'" },
      { ar:"فَلَمَّا مَاتَ أَبِيْ فَتَحْتُهْ فَإِذَا فِيهِ نَبِيٌّ يَخْرُجُ آخِرَ الزَّمَانِ مَولِدُهُ ﷺ بِمَكَّةَ، وَهِجْرَتُهُ بِالْمَدِينَةِ، وَسُلطَانُهُ بِالشَامِ",
        tr:"Falammā māta abī fataḥtuhu fa-idhā fīhi nabiyyun yakhruju ākhiraz-zamāni mawliduhu ﷺ bi-Makkata, wa hijratuhu bil-Madīnati, wa sulṭānuhu bish-Shām",
        en:"'When my father died I opened it, and in it was written: a prophet who will come at the end of time; his birthplace ﷺ is Mecca, his migration is to Medina, and his authority will reach Syria.'" },
      { ar:"يَقُصُّ شَعرَهُ وَيَتَّزِرُ عَلَى وَسَطِهِ، يَكُونُ خَيرَ الأَنبِيَاءِ وَأُمَّتُهُ خَيرَ الأُمَمْ، يُكَبِّرُونَ اللهَ تَعَالَىْ عَلَى كُلِّ شَرَفٍ، يَصُفُّونَ فِيْ الصَلاةِ كَصُفُوفِهِمْ فِيْ القِتَالْ، قُلُوبُهُمْ مَصَاحِفُهُمْ، يَحْمَدُونَ اللهَ تَعَالَىْ عَلَى كُلِّ شِدَّةٍ وَرَخَاءْ",
        tr:"Yaquṣṣu shaʿrahu wa yattaziru ʿalā wasaṭihi, yakūnu khayral-anbiyāʾi wa ummatuhu khayral-umam, yukabbirūna-Llāha taʿālā ʿalā kulli sharafin, yaṣuffūna fiṣ-ṣalāti ka-ṣufūfihim fil-qitāl, qulūbuhum maṣāḥifuhum, yaḥmadūna-Llāha taʿālā ʿalā kulli shiddatin wa rakhāʾ",
        en:"'He trims his hair and ties a waist-wrapper about his middle. He is the best of prophets and his nation the best of nations. They magnify Allah Most High at every honour; they form ranks in prayer as they form ranks in battle; their hearts are their scriptures; and they praise Allah Most High in every hardship and ease.'" },
      { ar:"ثُلُثٌ يَدْخُلُونَ الْجَنَّةَ بِغَيْرِ حِسَابْ ۞ (اللهُمَّ اجْعَلْنَا مِنْهُمْ) ۞ وَثُلُثٌ يَأْتُونَ بِذُنُوبِهِمْ وَخَطَايَاهُمْ فَيُغْفَرُ لَهُمْ، وَثُلُثٌ يَأْتُونَ بِذُنُوبٍ وَخَطَايَا عِظَامْ",
        tr:"Thuluthun yadkhulūnal-jannata bi-ghayri ḥisāb · (Allāhumma-jʿalnā minhum) · wa thuluthun yaʾtūna bi-dhunūbihim wa khaṭāyāhum fa-yughfaru lahum, wa thuluthun yaʾtūna bi-dhunūbin wa khaṭāyā ʿiẓām",
        en:"'A third of them enter Paradise without reckoning (O Allah, make us among them); a third come with their sins and mistakes and are forgiven; and a third come bearing grave sins and errors.'" },
      { ar:"فَيَقُولُ اللهُ تَعَالَى لِلمَلائِكَةِ اذْهَبُوْا فَزِنُوهُمْ، فيقولُونَ رَبَّنا وَجَدْنَاهُمْ أَسْرَفُوْا عَلَىْ أَنفُسِهِمْ وَوَجَدْنَا أَعمَالَهُمْ مِنَ الذُّنُوبِ كَأَمثَالِ الجِبَالِ، غَيرَ أَنَّهُمْ يَشهَدُونَ أَنْ لَا إِلَهَ إِلَّا الله وَأَنَّ مُحَمَّدًا رَسُولُ الله ﷺ",
        tr:"Fa-yaqūlu-Llāhu taʿālā lil-malāʾikatidh-habū fazinūhum, fa-yaqūlūna Rabbanā wajadnāhum asrafū ʿalā anfusihim wa wajadnā aʿmālahum minadh-dhunūbi ka-amthālil-jibāl, ghayra annahum yashhadūna an lā ilāha illa-Llāhu wa anna Muḥammadan rasūlu-Llāh ﷺ",
        en:"'Allah Most High says to the angels: Go and weigh them. They say: Our Lord, we found that they wronged themselves, and we found their sinful deeds like mountains — except that they bear witness that there is no god but Allah and that Muhammad is the Messenger of Allah ﷺ.'" },
      { ar:"أَشْهَدُ أَنْ لَا إِلَهَ إِلَّا الله وَأَنَّ مُحَمَّدًا رَسُولُ الله",
        tr:"Ashhadu an lā ilāha illa-Llāhu wa anna Muḥammadan rasūlu-Llāh",
        en:"I bear witness that there is no god but Allah and that Muhammad is the Messenger of Allah." },
      { ar:"فَيَقُولُ الْحَقُّ وَعِزَّتِي وَجَلالِيْ، لاَ جَعَلتُ مَنْ أَخْلَصَ لِي بِالشَّهَادَةِ كَمَنْ كَذَّبَ بِيْ، ادْخِلُوهُمُ الجَنَّةَ بِرَحْمَتِي",
        tr:"Fa-yaqūlul-Ḥaqqu wa ʿizzatī wa jalālī, lā jaʿaltu man akhlaṣa lī bish-shahādati ka-man kadhdhaba bī, adkhilūhumul-jannata bi-raḥmatī",
        en:"Then the Truth says: 'By My might and My majesty, I will not make one who was sincere to Me in bearing witness like one who denied Me. Admit them to Paradise by My mercy.'" },
      { ar:"يَا أَعَزَّ جَوَاهِرِ العُقُودِ ۞ وَخُلاصَةَ إِكْسِيرِ سِرِّ الوُجُودِ، مَادِحُكَ قَاصِرٌ وَلَوْ جَاءَ بِبَذْلِ الْمَجهُودْ، وَوَاصِفُكَ عَاجِزٌ عَنْ وَصفٍ مَا حَوَيْتَ مِنْ خِصَالِ الكَرَمِ وَالجُودْ",
        tr:"Yā aʿazza jawāhiril-ʿuqūd · wa khulāṣata iksīri sirril-wujūd, mādiḥuka qāṣirun wa law jāʾa bi-badhlil-majhūd, wa wāṣifuka ʿājizun ʿan waṣfi mā ḥawayta min khiṣālil-karami wal-jūd",
        en:"O most precious of the jewels of every necklace, O distilled essence of the secret of existence: the one who praises you falls short even when he gives his utmost, and the one who describes you is unable to capture the traits of generosity and bounty you possess." },
      { ar:"الكَوْنُ إِشَارَةٌ وَأَنتَ الْمَقصُودْ، يَا أَشرَفَ مَنْ نَالَ الْمَقَامَ الْمَحمُودْ، وَجَاءَت رُسُلٌ مِن قَبلِكَ وَلَكِنَّهُمْ بِالرِفْعَةِ وَالعُلَىْ لَكَ شُهُودْ",
        tr:"Al-kawnu ishāratun wa antal-maqṣūd, yā ashrafa man nālal-maqāmal-maḥmūd, wa jāʾat rusulun min qablika wa lākinnahum bir-rifʿati wal-ʿulā laka shuhūd",
        en:"The universe is but a sign, and you are its aim, O noblest of those who attained the Praiseworthy Station. Messengers came before you, yet they stand as witnesses to your elevation and loftiness." },
      { refrain:true, ar:"اللّٰهُمَّ صَلِّ وَسَلِّمْ وَبَارِكْ عَلَيْهِ وَعَلَى آلِهْ",
        tr:"Allāhumma ṣalli wa sallim wa bārik ʿalayhi wa ʿalā ālih",
        en:"O Allah, bless him, grant him peace, and pour Your blessings upon him and his family." }
    ] },
  { titleArabic:"مَوْلِدُهُ ﷺ", titleEnglish:"11 · His Birth (Mawlid)", verses:[
      { ar:"أَحْضِرُوْا قُلُوْبَكُمْ يَا مَعْشَرَ ذَوِي الأَلْبَابِ ۞ حَتَىْ أَجْلُوا لَكُمْ عَرَائِسَ مَعَانِي أَجَلِّ الأَحْبَابْ ۞ الْمَخْصُوصْ بِأَشْرَفِ الأَلْقَابْ ۞ الْرَاقِي إِلَى حَضْرَةِ الْمَلِكِ الْوَهَّابْ ۞ حَتَى نَظَرَ إِلَى جَمَالِهِ سِتْرٍ وَلا حِجَابْ",
        tr:"Aḥḍirū qulūbakum yā maʿshara dhawil-albāb · ḥattā ajluwa lakum ʿarāʾisa maʿānī ajallil-aḥbāb · al-makhṣūṣ bi-ashrafil-alqāb · ar-rāqī ilā ḥaḍratil-malikil-wahhāb · ḥattā naẓara ilā jamālihi bilā sitrin wa lā ḥijāb",
        en:"Bring your hearts present, O people of understanding, that I may unveil for you the bridal meanings of the most exalted of beloveds — the one singled out with the noblest of titles, who ascended to the presence of the Bestowing King, until he beheld His beauty with no screen and no veil." },
      { ar:"فَلَمَّا آنَ أَوَانُ ظُهُورِ شَمْسِ الْرِسَالَةْ فِي سَمَاءِ الْجَلالَةْ ۞ خَرَجَ مَرسُومُ الْجَلِيْلِ لِنَقِيبِ الْمَمْلَكَةِ جِبْرِيلْ",
        tr:"Falammā āna awānu ẓuhūri shamsir-risālah fī samāʾil-jalālah · kharaja marsūmul-jalīli li-naqībil-mamlakati Jibrīl",
        en:"When the time came for the sun of prophethood to rise in the sky of majesty, the decree of the Majestic One went forth to the chief of the kingdom, Jibril." },
      { ar:"يَا جِبْرِيلُ نَادِ فِيْ سَائِرِ الْمَخْلُوقَاتِ ۞ مِنْ أَهْلِ الأَرْضِ وَالْسَمَاوَاتِ بِالتَّهَانِي وَالْبِشَارَاتْ",
        tr:"Yā Jibrīlu nādi fī sāʾiril-makhlūqāt · min ahlil-arḍi was-samāwāti bit-tahānī wal-bishārāt",
        en:"'O Jibril, proclaim to all creation, to the dwellers of earth and the heavens, tidings of congratulation and glad news!'" },
      { ar:"فَإِنَّ الْنُوْرَ الْمَصُونَ وَالْسِرَّ الْمَكْنُونَ الَذِي أَوْجَدْتُهُ قَبْلَ وُجُودِ الأَشْيَاءِ ۞ وَإِبْدَاعِ الأَرْضِ وَالْسَمَاءْ ۞ أَنْقُلُهُ إِلَى بَطْنِ أُمِّهِ مَسْرُورَا",
        tr:"Fa-innan-nūral-maṣūna was-sirral-maknūnal-ladhī awjadtuhu qabla wujūdil-ashyāʾ · wa ibdāʿil-arḍi was-samāʾ · anquluhu ilā baṭni ummihi masrūrā",
        en:"'For the guarded light and the hidden secret, which I brought into being before the existence of all things and before the fashioning of earth and heaven — I now transfer him, joyfully, to the womb of his mother.'" },
      { ar:"أَمْلأُ بِهِ الْكَوْنَ نُوْرًا ۞ وَأَكْفُلُهُ يَتِيْمًا وَأُطَهِّرُهُ وَأَهْلَ عَتْه تَطْهِيْرًا",
        tr:"Amlaʾu bihil-kawna nūrā · wa akfuluhu yatīman wa uṭahhiruhu wa ahla baytihi taṭhīrā",
        en:"'I fill the universe with light through him; I take charge of him as an orphan, and I purify him and his household with a thorough purification.'" },
      { ar:"فَاهْتَزَّ الْعَرْشُ طَرَبًا وَاسْتِبْشَارًا",
        tr:"Fahtazzal-ʿarshu ṭaraban wastibshārā",
        en:"So the Throne trembled with joy and delight." },
      { ar:"وَازْدادَ الْكُرْسِيُّ هَيْبَةً وَوَقَارًا",
        tr:"Wazdādal-kursiyyu haybatan wa waqārā",
        en:"And the Footstool increased in awe and dignity." },
      { ar:"وَامْتَلأَتِ الْسَمَاوَاتُ أَنْوَارًا ۞ وَضَجَّتِ الْمَلَائِكَةُ تَهْلِيلًا وَتَمْجِيدًا وَاسْتِغْفَارًا",
        tr:"Wamtalaʾatis-samāwātu anwārā · wa ḍajjatil-malāʾikatu tahlīlan wa tamjīdan wastighfārā",
        en:"The heavens filled with lights, and the angels clamoured with declarations of Allah's oneness, glorification, and seeking forgiveness." },
      { ar:"سُبْحَانَ الله وَالْحَمْدُ لِلّٰهْ وَلَا إِلَهَ إِلَّا الله وَاللهُ أَكْبَرْ (٤ مرات)",
        tr:"Subḥāna-Llāh wal-ḥamdu lillāh wa lā ilāha illa-Llāh wa-Llāhu akbar (4x)",
        en:"Glory be to Allah, all praise is Allah's, there is no god but Allah, and Allah is Most Great. (four times)" },
      { ar:"وَلَمْ تَزَلْ أُمُّهُ تَرَى أَنْوَاعًا مِنْ فَخْرِهِ وَفَضْلِهِ إِلَى نِهَايَةِ تَمَامِ حَمْلِهْ ۞ فَلَمَّا اشْتَدَّ بِهَا الْطَلْقُ بِإِذْنِ رَبِّ الْخَلْقِ ۞ وَضَعَتِ الْحَبِيْبَ صَلَّى اللهُ عَلَيْهِ وَسَلَّمَ سَاجِدًا شَاكِرًا حَامِدًا كَأَنَّهُ الْبَدْرُ فِيْ تَمَامِهْ ۞ (محل القيام)",
        tr:"Wa lam tazal ummuhu tarā anwāʿan min fakhrihi wa faḍlihi ilā nihāyati tamāmi ḥamlih · falammash-tadda bihaṭ-ṭalqu bi-idhni Rabbil-khalq · waḍaʿatil-ḥabība ṣalla-Llāhu ʿalayhi wa sallama sājidan shākiran ḥāmidan ka-annahul-badru fī tamāmih · (stand)",
        en:"His mother continued to witness signs of his eminence and grace until the completion of her term. When the pangs of birth grew strong by the leave of the Lord of creation, she brought forth the Beloved ﷺ prostrate, thankful, praising — as though he were the full moon in its perfection. (Here it is customary to stand.)" },
      { refrain:true, ar:"اللّٰهُمَّ صَلِّ وَسَلِّمْ وَبَارِكْ عَلَيْهِ وَعَلَى آلِهْ",
        tr:"Allāhumma ṣalli wa sallim wa bārik ʿalayhi wa ʿalā ālih",
        en:"O Allah, bless him, grant him peace, and pour Your blessings upon him and his family." }
    ] },
  { titleArabic:"شَبَابُهُ ﷺ", titleEnglish:"12 · His Youth", verses:[
      { ar:"وَوُلِدَ صَلَّى اللهُ عَلَيْهِ وَسَلَّمَ مَخْتُونًا بِيَدِ العِنَايَةِ",
        tr:"Wa wulida ṣalla-Llāhu ʿalayhi wa sallama makhtūnan bi-yadil-ʿināyah",
        en:"He ﷺ was born already circumcised by the hand of divine care." },
      { ar:"مَكْحُولاً بِكُحْلِ الهِدَايَةِ",
        tr:"Makḥūlan bi-kuḥlil-hidāyah",
        en:"his eyes anointed with the kohl of guidance." },
      { ar:"فَأَشْرَقَ بِبَهَائِهِ الفَضَاءْ",
        tr:"Fa-ashraqa bi-bahāʾihil-faḍāʾ",
        en:"By his radiance all space lit up," },
      { ar:"وَتَلألأَ الكَوْنُ مِنْ نُورِهِ وَأَضَاءْ",
        tr:"Wa talaʾlaʾal-kawnu min nūrihi wa aḍāʾ",
        en:"and the universe sparkled and shone with his light." },
      { ar:"وَدَخَلَ فِيْ عَهدِ بَيعَتِهِ مَنْ بَقِيَ مِنَ الخَلائِقِ كَمَا دَخَلَ فِيهَا مَنْ مَضَىْ",
        tr:"Wa dakhala fī ʿahdi bayʿatihi man baqiya minal-khalāʾiqi kamā dakhala fīhā man maḍā",
        en:"Into the covenant of allegiance to him entered all creatures yet to come, just as those who had gone before had entered it." },
      { ar:"أَوَّلُ فَضِيلَةٍ مِنَ المُعجِزَاتِ بِخُمُودِ نَارِ فَارِسَ وَسُقُوطِ الشُّرُفَاتِ، وَرُمِيَتِ الشَيَاطِينُ مِنَ السَمَاءِ بِالشُّهُبِ الْمُحرِقَاتْ، وَرَجَعَ كُلُّ جَبَّارٍ مِنَ الجِنِّ وَهُوَ بِصَولَةٍ سَلطَنَتِهِ ذَلِيلٌ خَاضِعٌ",
        tr:"Awwalu faḍīlatin minal-muʿjizāti bi-khumūdi nāri Fārisa wa suqūṭish-shurufāt, wa rumiyatish-shayāṭīnu minas-samāʾi bish-shuhubil-muḥriqāt, wa rajaʿa kullu jabbārin minal-jinni wa huwa bi-ṣawlati salṭanatihi dhalīlun khāḍiʿ",
        en:"Among the first of his miracles was the dying out of the fire of Persia and the collapse of its palace balconies; the devils were pelted from the sky with burning stars; and every tyrant among the jinn returned, brought low and humbled despite the force of his dominion." },
      { ar:"لَمَّا تَأَلَّقَ مِن سَنَاهُ النُورُ السَاطِعُ وَأَشرقَ مِن بَهَائِهِ الضِّياءُ اللاَّمِعُ حَتَى عُرِضَ عَلَى الْمَرَاضِعْ",
        tr:"Lammā taʾallaqa min sanāhun-nūrus-sāṭiʿu wa ashraqa min bahāʾihiḍ-ḍiyāʾul-lāmiʿu ḥattā ʿuriḍa ʿalal-marāḍiʿ",
        en:"When the blazing light flashed from his brilliance and the gleaming radiance shone from his splendour, he was then presented to the wet-nurses." },
      { ar:"قِيلَ مَن يَكْفُلُ هَذِهِ الدُّرَّةَ اليَتِيمَةَ التِي لا تُوجَدُ لَهَا قِيمَةٌ؟ قَالَتِ الطُّيُورُ نَحْنُ نَكْفُلُهُ وَنَغْتَنِمُ هِمَّتَهُ العَظِيمَةْ",
        tr:"Qīla man yakfulu hādhihid-durratal-yatīmatal-latī lā tūjadu lahā qīmah? qālatiṭ-ṭuyūru naḥnu nakfuluhu wa naghtanimu himmatahul-ʿaẓīmah",
        en:"It was asked: Who will take charge of this priceless orphan pearl? The birds said: We will care for him and seize the honour of his mighty aspiration." },
      { ar:"قَالَتِ الوُحُوشُ نَحْنُ أَولَىْ بِذَلِكَ لِكَيْ نَنَالَ شَرَفَهُ وَتَعظِيمَهْ",
        tr:"Qālatil-wuḥūshu naḥnu awlā bi-dhālik likay nanāla sharafahu wa taʿẓīmah",
        en:"The wild beasts said: We are more deserving of that, so that we may attain his honour and his glorification." },
      { ar:"قِيلَ يَا مَعشَرَ الأُمَمِ اسْكُنُوا فَإِنَّ اللهَ قَدْ حَكَمَ فِيْ سَابِقِ حِكمَتِهِ القَدِيمَةْ، بِأَنَّ نَبِيَّهُ مُحَمَّدًا صَلَّى اللهُ عَلَيْهِ وَسَلَّمَ يَكُونُ رَضِيعًا لِحَلِيمَةَ الحَلِيمَةْ",
        tr:"Qīla yā maʿsharal-umamiskunū fa-inna-Llāha qad ḥakama fī sābiqi ḥikmatihil-qadīmah, bi-anna nabiyyahu Muḥammadan ﷺ yakūnu raḍīʿan li-Ḥalīmatal-ḥalīmah",
        en:"It was said: O company of nations, be still, for Allah has decreed in His prior, ancient wisdom that His Prophet Muhammad ﷺ will be nursed by the gentle Halima." },
      { ar:"فَلَمَّا أَعرَضَ عَنهُ مَرَاضِعُ الإِنسِ لِمَا سَبَقَ فِيْ طَيِّ الغَيبِ مِنَ السَّعَادَةِ لِحَلِيمَةَ بِنتِ أَبِيْ ذُؤَيبْ",
        tr:"Falammā aʿraḍa ʿanhu marāḍiʿul-insi limā sabaqa fī ṭayyil-ghaybi minas-saʿādati li-Ḥalīmata binti Abī Dhuʾayb",
        en:"When the human wet-nurses turned away from him — because of the happiness already ordained in the folds of the unseen for Halima bint Abi Dhuʾayb —" },
      { ar:"فَلَمَّا وَقَعَ نَظَرُهَا عَلَيهِ، بَادَرَتْ مُسْرِعَةً إِلَيهِ، وَوَضَعَتْهُ فِيْ حِجْرِهَا، وَضَمَّتْهُ إِلَى صَدْرِهَا",
        tr:"Falammā waqaʿa naẓaruhā ʿalayhi, bādarat musriʿatan ilayhi, wa waḍaʿat-hu fī ḥijrihā, wa ḍammat-hu ilā ṣadrihā",
        en:"the moment her glance fell upon him, she hurried to him, placed him in her lap, and pressed him to her chest." },
      { ar:"فَهَشَّ لَهَا مُتَبَسِّمًا فَخَرَجَ مِن ثَغْرِهِ نُورٌ لَحِقَ بِالسَّمَاءِ، فَحَمَلَتْهُ إِلَى رَحلِهَا، وَارتَحَلَتْ بِهِ إِلَى أَهلِهَا",
        tr:"Fa-hashsha lahā mutabassiman fa-kharaja min thaghrihi nūrun laḥiqa bis-samāʾ, fa-ḥamalat-hu ilā raḥlihā, wartaḥalat bihi ilā ahlihā",
        en:"He beamed at her with a smile, and from his mouth came forth a light that reached the sky. She carried him to her mount and set off with him to her people." },
      { ar:"فَلَمَّا وَصَلَتْ بِهِ إِلَى مُقَامِهَا، عَايَنَتْ بَرَكَتَهُ حَتَّىْ عَلَى أَغنَامِهَا",
        tr:"Falammā waṣalat bihi ilā muqāmihā, ʿāyanat barakatahu ḥattā ʿalā aghnāmihā",
        en:"When she reached her dwelling with him, she witnessed his blessing even upon her flocks." },
      { ar:"وَكَانَتْ كُلَّ يَومٍ تَرَى مِنهُ بُرهَانًا، وَتَرفَعُ لَهُ قَدرًا وَشَأنًا",
        tr:"Wa kānat kulla yawmin tarā minhu burhānan, wa tarfaʿu lahu qadran wa shaʾnā",
        en:"Every day she saw from him a fresh proof, and his worth and standing rose ever higher in her eyes." },
      { ar:"حَتَّىْ انْدَرَجَ فِيْ حُلَّةِ اللُّطفِ وَالأَمَانْ، وَدَخَلَ بَيْنَ إِخوَتِهِ مَعَ الْصِبْيَانْ",
        tr:"Ḥattandaraja fī ḥullatil-luṭfi wal-amān, wa dakhala bayna ikhwatihi maʿaṣ-ṣibyān",
        en:"until he grew up wrapped in the garment of gentleness and safety, and mixed among his foster-siblings and the other children." },
      { ar:"فَبَينَمَا الحَبِيبُ صَلَّى اللهُ عَلَيْهِ وَسَلَّمَ ذَاتَ يَومٍ نَاءٍ عَنِ الأَوطَانِ، إِذْ أَقبَلَ عَلَيهِ ثَلاثَةُ نَفَرٍ، كَأَنَّ وُجُوهَهُمُ الشَّمسُ وَالقَمَر",
        tr:"Fa-baynamal-ḥabību ﷺ dhāta yawmin nāʾin ʿanil-awṭān, idh aqbala ʿalayhi thalāthatu nafarin, ka-anna wujūhahumush-shamsu wal-qamar",
        en:"One day, while the Beloved ﷺ was some distance from home, three persons approached him, their faces as though the sun and the moon." },
      { ar:"فَانْطَلَقَ الصِّبْيَانُ هَرَبًا، وَوَقَفَ النَّبِيُّ صَلَّى اللهُ عَلَيهِ وَسَلَّمَ مُتَعَجِّبًا",
        tr:"Fanṭalaqaṣ-ṣibyānu haraban, wa waqafan-nabiyyu ﷺ mutaʿajjibā",
        en:"The other children ran off in fright, while the Prophet ﷺ stood in wonder." },
      { ar:"فَأَضْجَعُوهُ عَلَى الأَرضِ إِضْجَاعًا خَفِيفًا، وَشَقُّوا بَطنَهُ شَقًّا لَطِيفًا",
        tr:"Fa-aḍjaʿūhu ʿalal-arḍi iḍjāʿan khafīfan, wa shaqqū baṭnahu shaqqan laṭīfā",
        en:"They laid him gently upon the ground and opened his chest with a delicate incision." },
      { ar:"ثُمَّ أَخرَجُوا قَلبَ سَيِّدِ وَلَدِ عَدنَانَ، وشَرَحُوهْ بِسِكِّينِ الإِحسَانِ، وَنَزَعُوا مِنهُ حَظَّ الشَيطَانِ، وَمَلأُوهُ بِالحِلمِ وَالعِلمِ وَاليَقِينِ وَالرِضوَان",
        tr:"Thumma akhrajū qalba sayyidi waladi ʿAdnāna, wa sharaḥūhu bi-sikkīnil-iḥsāni, wa nazaʿū minhu ḥaẓẓash-shayṭāni, wa malaʾūhu bil-ḥilmi wal-ʿilmi wal-yaqīni war-riḍwān",
        en:"Then they brought out the heart of the master of the children of ʿAdnan, opened it with the knife of excellence, removed from it the portion of Satan, and filled it with forbearance, knowledge, certainty, and [Allah's] good pleasure." },
      { ar:"وَأَعَادُوهُ إِلى مَكَانِهِ فَقَامَ الحَبِيبُ صَلَّى اللهُ عَلَيهِ وَسَلَّمَ سَوِيًّا كَمَا كَانَ",
        tr:"Wa aʿādūhu ilā makānihi fa-qāmal-ḥabību ﷺ sawiyyan kamā kān",
        en:"They returned it to its place, and the Beloved ﷺ rose up whole, just as he had been." },
      { ar:"يَا حَبِيبَ الرَّحمَنِ لَو عَلِمتَ مَا يُرَادُ بِكَ مِنَ الخَيرِ لَعَرَفتَ قَدرَ مَنزِلَتِكَ عَلَى الغَيرِ، وَازْدَدتَ فَرَحًا وَسُرُورًا وَبَهجَةً وَنُورًا",
        tr:"Yā ḥabībar-Raḥmāni law ʿalimta mā yurādu bika minal-khayri la-ʿarafta qadra manzilatika ʿalal-ghayr, wazdadta faraḥan wa surūran wa bahjatan wa nūrā",
        en:"[The angels said:] O beloved of the All-Merciful, had you known the good that is intended for you, you would recognise your rank above all others, and you would only increase in joy, delight, gladness, and light." },
      { ar:"يَا مُحَمَّدُ أَبشِرْ، فَقَدْ نُشِرَتْ فِيْ الكَائِنَاتِ أَعلامُ عُلومِك، وَتَبَاشَرَتِ الْمَخلُوقَاتُ بِقُدُومِكَ، وَلَمْ يَبقَىْ شَيءٌ مِمَّا خَلَقَ اللهُ تَعَالَى إِلَّا جَاءَ لِأَمرِكَ طَائِعًا، وَلِمَقَالَتِكَ سَامِعًا",
        tr:"Yā Muḥammadu abshir, faqad nushirat fil-kāʾināti aʿlāmu ʿulūmik, wa tabāsharatil-makhlūqātu bi-qudūmik, wa lam yabqa shayʾun mimmā khalaqa-Llāhu taʿālā illā jāʾa li-amrika ṭāʾiʿan, wa li-maqālatika sāmiʿā",
        en:"O Muhammad, rejoice! The banners of your knowledge have been unfurled across the worlds, creation has exulted at your coming, and nothing Allah Most High created remains but that it comes obedient to your command and attentive to your word." },
      { ar:"فَسَيَأتِيكَ البَعِيرُ بِذِمَامِكَ يَستَجِيرُ، وَالضَّبُّ وَالغَزَالَةُ، يَشهَدانِ لَكَ بِالرِّسَالَةْ",
        tr:"Fa-sa-yaʾtīkal-baʿīru bi-dhimāmika yastajīr, waḍ-ḍabbu wal-ghazālah, yash-hadāni laka bir-risālah",
        en:"The camel will come seeking your protection; the lizard and the gazelle will both bear witness to your prophethood." },
      { ar:"وَالشَّجَرُ وَالقَمَرُ والذِئبُ يَنطِقُونَ بِنُبُوَّتِكَ عَن قَرِيبٍ",
        tr:"Wash-shajaru wal-qamaru wadh-dhiʾbu yanṭiqūna bi-nubuwwatika ʿan qarīb",
        en:"The trees, the moon, and the wolf will soon speak openly of your prophethood." },
      { ar:"وَمَركَبُكَ البُراقُ إِلى جَمَالِكَ مُشتَاقٌ",
        tr:"Wa markabukal-burāqu ilā jamālika mushtāq",
        en:"Your mount, al-Buraq, longs for your beauty." },
      { ar:"وَجِبرِيلُ شَاوُوشُ مَملَكَتِكَ قَدْ أَعلَنَ بِذِكرِكَ فِي الآفَاقِ",
        tr:"Wa Jibrīlu shāwūshu mamlakatika qad aʿlana bi-dhikrika fil-āfāq",
        en:"And Jibril, the herald of your kingdom, has already proclaimed your remembrance across the horizons." },
      { ar:"وَالقَمَرُ مَأمُورٌ لَكَ بِالانشِقَاقْ",
        tr:"Wal-qamaru maʾmūrun laka bil-inshiqāq",
        en:"And the moon has been commanded to split for you." },
      { ar:"وَقِيلَ لِبَعضِهِمْ: كَأَنَّ وَجهَهُ القَمَرْ، فَقَالَ: بَلْ أَضْوَأُ مِنَ القَمَرِ، إِذَا لَمْ يَحُلْ دُونَهُ الغَمَامُ، قَدْ غَشِيَهُ الجَلالُ وَانْتَهَىْ إليهِ الكَمَالُ",
        tr:"Wa qīla li-baʿḍihim: ka-anna wajhahul-qamar, fa-qāla: bal aḍwaʾu minal-qamari, idhā lam yaḥul dūnahul-ghamām, qad ghashiyahul-jalālu wantahā ilayhil-kamāl",
        en:"It was said to some of them: His face was like the moon. He replied: Rather brighter than the moon when no cloud veils it — majesty enveloped him, and perfection reached its fullness in him." },
      { ar:"وَبَينَمَا الحَبِيبُ صَلَّى اللهُ عَلَيهِ وَسَلَّمَ مُنصِتٌ لِسَمَاعِ تِلكَ الأَشبَاحِ، وَوَجهُهُ مُتَهَلِّلٌ كَنُورِ الصَبَاحِ",
        tr:"Wa baynamal-ḥabību ﷺ munṣitun li-samāʿi tilkal-ashbāḥ, wa wajhuhu mutahallilun ka-nūriṣ-ṣabāḥ",
        en:"And while the Beloved ﷺ was quietly listening to those forms, his face beaming like the light of morning," },
      { ar:"إِذْ أَقبَلَتْ حَلِيمَةُ مُعلِنَةً بِالصِّيَاحِ تَقُولُ: وَاغَرِيبَاهُ. فَقَالَتِ الْمَلائِكَةُ: مَا أَنتَ يَا مُحَمَّدُ بِغَرِيبٍ، بَلْ أَنْتَ مِنَ اللّٰهِ قَرِيبٌ، وَأَنتَ لَهُ صَفِيٌّ وَحَبِيبٌ",
        tr:"Idh aqbalat Ḥalīmatu muʿlinatan biṣ-ṣiyāḥi taqūlu: wā gharībāh. Fa-qālatil-malāʾikatu: mā anta yā Muḥammadu bi-gharīb, bal anta mina-Llāhi qarīb, wa anta lahu ṣafiyyun wa ḥabīb",
        en:"Halima came crying out: 'O my poor lonely one!' The angels said: 'You are no stranger, O Muhammad; rather you are near to Allah, His chosen one and His beloved.'" },
      { ar:"قَالَتْ حَلِيمَةُ: وَاوَحِيدَاهُ. فَقَالَتِ الْمَلائِكَةُ: يَا مُحَمَّدُ، مَا أَنتَ بِوَحِيد، بَلْ أَنتَ صَاحِبُ التَّأيِيدِ، وَأَنِيسُكَ الحَمِيدُ الْمَجِيدُ، وَإِخوَانُكَ الْمَلائِكَةُ وَأَهلُ التَّوحِيدِ",
        tr:"Qālat Ḥalīmatu: wā waḥīdāh. Fa-qālatil-malāʾikatu: yā Muḥammadu, mā anta bi-waḥīd, bal anta ṣāḥibut-taʾyīd, wa anīsukal-ḥamīdul-majīd, wa ikhwānukal-malāʾikatu wa ahlut-tawḥīd",
        en:"Halima said: 'O my lonely one!' The angels said: 'O Muhammad, you are not alone; you are the one granted divine support; your companion is the Praiseworthy, the Glorious; and your brethren are the angels and the people of divine oneness.'" },
      { ar:"قَالَتْ حَلِيمَةُ: وَايَتِيمَاهُ. فَقَالَتِ الْمَلائِكَةُ: لِلّٰهِ دَرُّكَ مِن يَتِيمٍ، فَإِنَّ قَدرَكَ عِندَ اللّٰهِ عَظِيم",
        tr:"Qālat Ḥalīmatu: wā yatīmāh. Fa-qālatil-malāʾikatu: lillāhi darruka min yatīmin, fa-inna qadraka ʿinda-Llāhi ʿaẓīm",
        en:"Halima said: 'O my orphan!' The angels said: 'How excellent an orphan you are! For your rank with Allah is tremendous.'" },
      { ar:"فَلَمَّا رَأَتْهُ حَلِيمَةُ سَالِمًا مِنَ الأَهوَالِ رَجَعَتْ بِهِ مَسرُورَةً إِلَى الأَطلالِ، ثُمَّ قَصَّتْ خَبَرَهُ عَلَى بَعضِ الكُهَّانْ",
        tr:"Falammā raʾat-hu Ḥalīmatu sāliman minal-ahwāli rajaʿat bihi masrūratan ilal-aṭlāl, thumma qaṣṣat khabarahu ʿalā baʿḍil-kuhhān",
        en:"When Halima saw him safe from all terrors, she returned with him joyfully to her camp, then related his story to some of the soothsayers." },
      { ar:"وَأَعَادَتْ عَلَيهِ مَا تَمَّ مِنْ أَمرِهِ وَمَا كَانَ، فَقَالَ لَهُ الكَاهِنُ: يَا ابْنَ زَمزَمَ وَالْمَقَامِ وَالرُّكنِ وَالبَيتِ الحَرَامِ، أَفِيْ اليَقْظَةِ رَأَيْتَ هَذَا أَمْ فِيْ الْمَنَامِ؟",

      { ar:"فَقَالَ وَحُرْمَةِ الْمَلِكِ العَلَّامِ، شَاهَدتُهُمْ كِفَاحًا لا أَشُكُّ فِيْ ذَلِكَ وَلا أُضَامُ",
        tr:"Fa-qāla wa ḥurmatil-malikil-ʿallām, shāhadtuhum kifāḥan lā ashukku fī dhālika wa lā uḍām",

      { ar:"فَقَالَ لَهُ الكَاهِنُ: أَبشِرْ أَيُّهَا الغُلامُ، فَأَنتَ صَاحِبُ الأَعلامِ، وَنُبُوَّتُكَ لِلأَنبِيَاءِ قِفلٌ وَخِتَامٌ، وَعَلَيكَ يَنزِلُ جِبرِيلُ، وَعَلى بِسَاطِ القُدسِ يُخَاطِبُكَ الجَلِيلُ",
        tr:"Fa-qāla lahul-kāhinu: abshir ayyuhal-ghulām, fa-anta ṣāḥibul-aʿlām, wa nubuwwatuka lil-anbiyāʾi qiflun wa khitām, wa ʿalayka yanzilu Jibrīl, wa ʿalā bisāṭil-qudsi yukhāṭibukal-jalīl",
        en:"The soothsayer said: 'Rejoice, O boy! You are the bearer of the banners; your prophethood is the lock and seal upon all prophethood; upon you Jibril will descend, and upon the carpet of holiness the Majestic One will address you.'" },
      { ar:"وَمَنْ ذَا الذِيْ يَحصُرُ مَا حَوَيتَ مِنَ التَفضِيلِ، وَعَنْ بَعضِ وَصفِ مَعنَاكَ يَقصُرُ لِسَانُ الْمَادِحِ الْمُطِيلِ",
        tr:"Wa man dhal-ladhī yaḥṣuru mā ḥawayta minat-tafḍīl, wa ʿan baʿḍi waṣfi maʿnāka yaqṣuru lisānul-mādiḥil-muṭīl",
        en:"Who could ever encompass the excellences you contain? Even the tongue of the most lavish praiser falls short of describing a fraction of your reality." },
      { ar:"وَكَانَ صَلَّى اللهُ عَلَيهِ وَسَلَّمَ أَحسَنَ النَاسِ خَلقًا وَخُلُقًا، وَأَهْدَاهُمْ إِلَىْ الحَقِّ طُرُقًا، وَكَانَ خُلُقُهُ القُرْآنَ",
        tr:"Wa kāna ﷺ aḥsanan-nāsi khalqan wa khuluqan, wa ahdāhum ilal-ḥaqqi ṭuruqan, wa kāna khuluquhul-Qurʾān",
        en:"He ﷺ was the finest of people in form and in character, the most rightly guiding of them to the truth — and his character was the Qur'an itself." },
      { ar:"وَشِيمَتُهُ الغُفرَانَ، يَنصَحُ لِلإِنسَانِ، وَيَفسَحُ فِيْ الإِحسَانِ، وَيَعفُو عَنِ الذَّنبِ إِنْ كَانَ فِيْ حَقِّهِ وَسَبَبِهْ",
        tr:"Wa shīmatuhul-ghufrān, yanṣaḥu lil-insān, wa yafsaḥu fil-iḥsān, wa yaʿfū ʿanidh-dhanbi in kāna fī ḥaqqihi wa sababih",
        en:"Forgiveness was his nature; he gave sincere counsel to people, was expansive in doing good, and pardoned wrongs done against him." },
      { ar:"فَإِذَا ضُيِّعَ حَقُّ اللّٰهِ لَمْ يَقُمْ أَحَدٌ لِغَضَبِهِ، مَنْ رَآهُ بَدِيهَةً هَابَهُ، وَإِذَا دَعَاهُ الْمِسكِينُ أَجَابَهُ",
        tr:"Fa-idhā ḍuyyiʿa ḥaqqu-Llāhi lam yaqum aḥadun li-ghaḍabihi, man raʾāhu badīhatan hābahu, wa idhā daʿāhul-miskīnu ajābah",
        en:"But when a right of Allah was violated, none could stand before his anger. Whoever saw him unexpectedly was struck with awe of him, and when a poor person called upon him, he answered." },
      { ar:"يَقُولُ الحَقَّ وَلَوْ كَانَ مُرًّا، وَلاَ يُضْمِرُ لِمُسلِمٍ غِشًّا وَلا ضُرًّا",
        tr:"Yaqūlul-ḥaqqa wa law kāna murran, wa lā yuḍmiru li-muslimin ghishshan wa lā ḍurrā",
        en:"He spoke the truth even if it was bitter, and he harboured toward no Muslim any deceit or harm." },
      { ar:"مَنْ نَظَرَ فِيْ وَجْهِهِ عَلِمَ أَنَّهُ لَيسَ بِوَجْهِ كَذَّابٍ، وَكَانَ صَلَّى اللهُ عَلَيهِ وَسَلَّمَ لَيسَ بِغَمَّازٍ وَلا عَيَّابٍ",
        tr:"Man naẓara fī wajhihi ʿalima annahu laysa bi-wajhi kadhdhāb, wa kāna ﷺ laysa bi-ghammāzin wa lā ʿayyāb",
        en:"Whoever looked into his face knew it was not the face of a liar; and he ﷺ was neither a backbiter nor a faultfinder." },
      { ar:"إِذَا سُرَّ كَأَنَّ وَجهَهُ قِطعَةُ قَمَرٍ، وَإِذَا كَلَّمَ النَّاسَ، فَكَأَنَّمَا يَجنُونَ مِنْ كَلامِهِ أَحلَىْ ثَمَرٍ",
        tr:"Idhā surra ka-anna wajhahu qiṭʿatu qamar, wa idhā kallaman-nāsa, fa-ka-annamā yajnūna min kalāmihi aḥlā thamar",
        en:"When he was glad, his face was like a piece of the moon; and when he spoke to people, it was as though they were gathering the sweetest fruit from his words." },
      { ar:"وَإِذَا تَبَسَّمَ تَبَسَّمَ عَنْ مِثلِ حَبِّ الغَمَامِ، وَإِذَا تَكَلَّمَ فَكَأَنَّ الدُّرَّ يَسقُطُ مِن ذَلِكَ الكَلامِ، وَإِذَا تَحَدَّثَ فَكَأَنَّ الْمِسكَ يَخرُجُ مِن فِيهِ",
        tr:"Wa idhā tabassama tabassama ʿan mithli ḥabbil-ghamām, wa idhā takallama fa-ka-annad-durra yasquṭu min dhālikal-kalām, wa idhā taḥaddatha fa-ka-annal-miska yakhruju min fīh",
        en:"When he smiled, his teeth shone like hailstones of a cloud; when he spoke, it was as though pearls fell from his words; and when he conversed, it was as though musk issued from his mouth." },
      { ar:"وَإِذَا مَرَّ بِطَرِيقٍ عُرِفَ مِنْ طِيبِهِ أَنَّهُ قَد مَرَّ فِيهِ",
        tr:"Wa idhā marra bi-ṭarīqin ʿurifa min ṭībihi annahu qad marra fīh",
        en:"When he passed along a road, it was known from his fragrance that he had passed there." },
      { ar:"وَإِذَا جَلَسَ فِيْ مَجلِسٍ بَقِيَ طِيبُهُ فِيهِ أَيَّامًا وَإِنْ تَغَيَّبَ، وَيُوجَدُ مِنْهُ أَحسَنُ طِيبٍ، وَإِنْ لَمْ يَكُنْ قَدْ تَطَيَّبَ",
        tr:"Wa idhā jalasa fī majlisin baqiya ṭībuhu fīhi ayyāman wa in taghayyab, wa yūjadu minhu aḥsanu ṭībin, wa in lam yakun qad taṭayyab",
        en:"When he sat in a gathering, his fragrance lingered there for days after he had left; and the finest scent came from him, though he had used no perfume." },
      { ar:"وَإِذَا مَشَىْ بَينَ أَصحَابِهِ فَكَأَنَّهُ القَمَرُ بَينَ النُّجُومِ الزُّهَرِ",
        tr:"Wa idhā mashā bayna aṣḥābihi fa-ka-annahul-qamaru baynan-nujūmiz-zuhar",
        en:"When he walked among his companions, he was like the moon among the bright shining stars." },
      { ar:"وَإِذَا أَقبَلَ لَيْلاً فَكَأَنَّ النَّاسَ مِنْ نُورِهِ فِيْ أَوَانِ الظُّهرِ",
        tr:"Wa idhā aqbala laylan fa-ka-annan-nāsa min nūrihi fī awāniẓ-ẓuhr",

      { ar:"وَكَانَ صَلَّى اللهُ عَلَيهِ وَسَلَّمَ أَجوَدَ بِالخَيرِ مِنَ الرِيحِ الْمُرسَلَةِ، وَكَانَ يُرفَقُ بِاليَتِيمِ وَالأَرمَلَةِ",
        tr:"Wa kāna ﷺ ajwada bil-khayri minar-rīḥil-mursalati, wa kāna yarfuqu bil-yatīmi wal-armalah",
        en:"He ﷺ was more generous with good than the sent wind, and he was gentle with the orphan and the widow." },
      { ar:"وَقَالَ بَعضُ وَاصِفِيهِ: مَا رَأَيْتُ مِنْ ذِيْ لُمَّةٍ سَودَاءَ فِيْ حُلَّةٍ حَمرَاءَ، أَحسَنَ مِنْ رَسُولِ اللّٰهِ صَلَّى اللهُ عَلَيهِ وَسَلَّمَ",
        tr:"Wa qāla baʿḍu wāṣifīhi: mā raʾaytu min dhī lummatin sawdāʾa fī ḥullatin ḥamrāʾa, aḥsana min rasūli-Llāhi ﷺ",
        en:"One who described him said: 'I never saw anyone with black locks in a red garment more beautiful than the Messenger of Allah ﷺ.'" },
      { ar:"وَقِيلَ لِبَعضِهِمْ: كَأَنَّ وَجهَهُ القَمَرْ، فَقَالَ: بَلْ أَضْوَأُ مِنَ القَمَرِ، إِذَا لَمْ يَحُلْ دُونَهُ الغَمَامُ، قَدْ غَشِيَهُ الجَلالُ وَانْتَهَىْ إِلَيهِ الكَمَالُ",
        tr:"Wa qīla li-baʿḍihim: ka-anna wajhahul-qamar, fa-qāla: bal aḍwaʾu minal-qamari, idhā lam yaḥul dūnahul-ghamām, qad ghashiyahul-jalālu wantahā ilayhil-kamāl",
        en:"It was said to some of them: His face was like the moon. He replied: Rather brighter than the moon when no cloud veils it; majesty enveloped him, and perfection reached its fullness in him." },
      { ar:"قَالَ بَعضُ وَاصِفِيهِ: مَا رَأَيْتُ قَبْلَهُ وَلاَ بَعدَهُ مِثلَهُ",
        tr:"Qāla baʿḍu wāṣifīhi: mā raʾaytu qablahu wa lā baʿdahu mithlah",

      { ar:"فَيَعجَزُ لِسَانُ البَلِيغِ إِذَا أَرَادَ أَنْ يُحصِيَ فَضلَهُ",
        tr:"Fa-yaʿjazu lisānul-balīghi idhā arāda an yuḥṣiya faḍlah",
        en:"The tongue of the most eloquent fails when it tries to enumerate his excellence." },
      { ar:"فَسُبْحَانَ مَنْ خَصَّهُ صَلَّى اللهُ عَلَيهِ وَسَلَّمَ بِالْمَحَلِّ الأَسْنَىْ، وَأَسْرَىْ بِهِ إِلَى قَابِ قَوسَينِ أَوْ أَدْنَىْ",

        tr:"Wa ayyadahu bil-muʿjizātil-latī lā tuḥṣā",
        en:"And supported him with miracles beyond counting," },
      { ar:"وَأَوْفَاهُ مِنْ خِصَالِ الكَمَالِ مَا يَجِلُّ أَنْ يُستَقصَىْ، وَأَعْطَاهُ خَمْسَةً لَمْ يُعْطِهِنَّ أَحَدًا قَبلَهُ",
        tr:"Wa awfāhu min khiṣālil-kamāli mā yajillu an yustaqṣā, wa aʿṭāhu khamsatan lam yuʿṭihinna aḥadan qablah",
        en:"and granted him such perfect qualities as are too great to be fully counted, and gave him five things He had given to none before him." },
      { ar:"وَآتَاهُ جَوَامِعَ الكَلِمِ، فَلَمْ يُدرِكْ أَحَدٌ فَضْلَهُ",
        tr:"Wa ātāhu jawāmiʿal-kalim, fa-lam yudrik aḥadun faḍlah",
        en:"He gave him the most comprehensive of speech; no one has grasped the full measure of his merit." },
      { ar:"وَكَانَ لَهُ فِيْ كُلِّ مَقَامٍ مَقَالٌ، وَلِكُلِّ كَمَالٍ مِنهُ كَمَالٌ",
        tr:"Wa kāna lahu fī kulli maqāmin maqāl, wa li-kulli kamālin minhu kamāl",
        en:"In every station he had the fitting word, and to every perfection he added a perfection of his own." },
      { ar:"لاَ يَحُورُ فِيْ سُؤَالٍ وَلاَ جَوَابٍ، وَلاَ يَجُولُ لِسَانُهُ إِلاَّ فِيْ صَوَابٍ",
        tr:"Lā yaḥūru fī suʾālin wa lā jawāb, wa lā yajūlu lisānuhu illā fī ṣawāb",
        en:"He was never at a loss in question or answer, and his tongue moved in nothing but what was correct." },
      { ar:"وَمَا عَسَىْ أَنْ يُقَالَ فِيْ مَنْ وَصَفَهُ القُرْآنْ، وَأَعْرَبَ عَنْ فَضَائِلِهِ التَورَاةُ وَالإِنجِيلُ وَالزَّبُورُ وَالفُرقَانْ",
        tr:"Wa mā ʿasā an yuqāla fī man waṣafahul-Qurʾān, wa aʿraba ʿan faḍāʾilihit-Tawrātu wal-Injīlu waz-Zabūru wal-Furqān",
        en:"And what more can be said of one whom the Qur'an described, and whose excellences the Torah, the Gospel, the Psalms, and the Criterion all made known?" },
      { ar:"وَجَمَعَ اللهُ لَهُ بَينَ رُؤْيَتِهِ وَكَلامِهِ، وَقَرَنَ اسْمَهُ مَعَ اسْمِهِ تَنبِيهًا عَلَى عُلُوِّ مَقَامِهِ",
        tr:"Wa jamaʿa-Llāhu lahu bayna ruʾyatihi wa kalāmihi, wa qarana-smahu maʿa-smihi tanbīhan ʿalā ʿuluwwi maqāmih",
        en:"Allah joined for him both the seeing of Him and the speaking with Him, and coupled his name with His own Name, as a sign of the loftiness of his station." },
      { ar:"وَجَعَلَهُ رَحمَةً لِلعَالَمِينَ وَنُورًا، وَمَلأَ بِمَولِدِهِ القُلُوبَ سُرُورًا",
        tr:"Wa jaʿalahu raḥmatan lil-ʿālamīna wa nūran, wa malaʾa bi-mawlidihil-qulūba surūrā",
        en:"He made him a mercy to all the worlds and a light, and filled hearts with joy through his birth." },
      { refrain:true, ar:"اللّٰهُمَّ صَلِّ وَسَلِّمْ وَبَارِكْ عَلَيْهِ وَعَلَى آلِهْ",
        tr:"Allāhumma ṣalli wa sallim wa bārik ʿalayhi wa ʿalā ālih",
        en:"O Allah, bless him, grant him peace, and pour Your blessings upon him and his family." }

function navBar(){
  return `<nav class="tabbar">${TABS.map(t=>`
    <button class="tab ${state.tab===t.id?'active':''}" onclick="selectTab('${t.id}')">
      <span class="tab-en">${t.label}</span>
      <span class="tab-ar">${t.ar}</span>
    </button>`).join('')}</nav>`;
}

function selectTab(id){
  stopAutoScroll();
  state.tab = id;
  state.query = '';
  state.burdahChapter = null;
  renderIndex();
}

/* Cards for a given group, honoring the search query. */
/* ── Mawlid ad-Daybaʿi: one ordered section ──────────────────────
   The mawlid's pieces live in two arrays: QASIDAS (its duas and qasidas)
   and SIRAH_CHAPTERS (its prose). Each carries its section number from the
   kitab in its title, e.g. "13b · …". We merge both and sort by that number
   so the tab follows the book's own order. A qasida with NO section number
   didn't come from the mawlid — it belongs under the Qasidas tab. */
const SECTION_RE = /^(\d+)(b?)\s*·\s*(.*)$/;

function sectionOf(title){
  const m = SECTION_RE.exec(title || '');
  if(!m) return null;
  return { num: +m[1] + (m[2] ? 0.5 : 0), label: m[1] + m[2], rest: m[3] };
}

function mawlidItems(){
  const items = [];
  QASIDAS.forEach((qa, i) => {
    const sec = sectionOf(qa.titleEnglish);
    if(sec) items.push({ sec, kind:'q', idx:i, piece:qa });
  });
  SIRAH_CHAPTERS.forEach((c, n) => {
    const sec = sectionOf(c.titleEnglish);
    if(sec) items.push({ sec, kind:'s', idx:n, piece:c });
  });
  items.sort((a,b) => a.sec.num - b.sec.num);
  /* Number them 1..N by their place in the kitab's order. The badge is a
     running position, not the kitab's own number, so the list never skips
     even though some of the kitab's sections aren't in the app yet. Adding a
     missing section later slots it in and renumbers everything automatically. */
  items.forEach((it, n) => { it.pos = n + 1; });
  return items;
}

function mawlidCards(){
  /* Position is assigned before filtering, so searching never renumbers. */
  const items = mawlidItems().filter(x => matchesQuery(x.piece, state.query));
  if(items.length === 0) return '';
  return items.map(({pos, kind, idx, piece}) => `
        <button class="qcard" onclick="${kind==='s' ? 'openSirah' : 'openQasida'}(${idx})">
          <span class="num">${toArNum(pos)}</span>
          <span class="titles">
            <span class="t-ar">${piece.titleArabic}</span>
            <span class="t-en">${sectionOf(piece.titleEnglish).rest}</span>
          </span>
          <span class="chev">›</span>
        </button>`).join('');
}

/* Qasidas that did not come from the Mawlid ad-Daybaʿi */
/* Qasidas that did not come from the mawlid — the source of truth for both
   the Qasidas tab and the landing page's count. */
function additionalQasidaItems(){
  return QASIDAS.map((qa,i) => ({q:qa, i}))
    .filter(x => x.q.group === 'qasidas' && !sectionOf(x.q.titleEnglish));
}

function additionalQasidaCards(){
  const items = additionalQasidaItems().filter(x => matchesQuery(x.q, state.query));
  if(items.length === 0) return '';
  return items.map(({q:qa, i}, n) => `
        <button class="qcard" onclick="openQasida(${i})">
          <span class="num">${toArNum(n+1)}</span>
          <span class="titles">
            <span class="t-ar">${qa.titleArabic}</span>
            <span class="t-en">${qa.titleEnglish}</span>
          </span>
          <span class="chev">›</span>
        </button>`).join('');
}

function groupCards(group){
  const q = state.query;
  let items = QASIDAS.map((qa,i)=>({q:qa,i}))
    .filter(x=>x.q.group===group)
    .filter(x=>matchesQuery(x.q, q));
  if(q){
    const nq = normalize(q);
    const titleHit = (qa) => {
      const t = normalize(qa.titleEnglish + ' ' + qa.titleArabic);
      return (nq && t.includes(nq)) || (qa.titleEnglish + qa.titleArabic).toLowerCase().includes(q.toLowerCase().trim());
    };
    items.sort((a,b)=> (titleHit(b.q)?1:0) - (titleHit(a.q)?1:0));
  }
  if(items.length === 0) return '';
  return items.map(({q:qa,i},n)=>`
        <button class="qcard" onclick="openQasida(${i})">
          <span class="num">${toArNum(n+1)}</span>
          <span class="titles">
            <span class="t-ar">${qa.titleArabic}</span>
            <span class="t-en">${qa.titleEnglish}</span>
          </span>
          <span class="chev">›</span>
        </button>`).join('');
}

function searchBox(atBottom){
  /* Resting placeholder is just "Search"; the fuller hint appears once you're
     actually typing, so the bar stays quiet on the page. */
  return `
      <div class="search-wrap${atBottom ? ' at-bottom' : ''}">
        <svg class="search-icon" viewBox="0 0 16 16" fill="none" aria-hidden="true"
             stroke="currentColor" stroke-width="1.6" stroke-linecap="round">
          <circle cx="7" cy="7" r="4.4"/><line x1="10.4" y1="10.4" x2="14.2" y2="14.2"/>
        </svg>
        <input id="search" class="search" type="search" inputmode="search"
          placeholder="Search"
          onfocus="this.placeholder='e.g. ya nabi, salaam, mercy…'"
          onblur="this.placeholder='Search'"
          autocomplete="off" autocapitalize="off" autocorrect="off"
          value="${state.query.replace(/"/g,'&quot;')}"
          oninput="updateSearch(this.value)">
        ${state.query ? '<button class="search-clear" onclick="clearSearch()">✕</button>' : ''}
      </div>`;
}

function updateSearch(val){
  state.query = val;
  const results = document.getElementById('results');
  if(results) results.innerHTML = renderResults();
}

/* Placeholder shown for sections whose content isn't added yet. */
function placeholder(title){
  return `<div class="placeholder">
      <div class="ph-star">۞</div>
      <p><strong>${title}</strong></p>
      <p>No entries here yet. This section is ready — its contents can be added whenever you like.</p>
    </div>`;
}

function burdahCards(){
  const items = BURDAH_CHAPTERS.map((c,n)=>({c,n})).filter(x=>matchesQuery(x.c, state.query));
  if(items.length === 0) return '';
  return items.map(({c,n})=>`
        <button class="qcard" onclick="openBurdah(${n})">
          <span class="num">${toArNum(n+1)}</span>
          <span class="titles">
            <span class="t-ar">${c.titleArabic}</span>
            <span class="t-en">${c.titleEnglish}</span>
          </span>
          <span class="chev">›</span>
        </button>`).join('');
}

function ilahiCards(){
  const items = ILAHI_CHAPTERS.map((c,n)=>({c,n})).filter(x=>matchesQuery(x.c, state.query));
  if(items.length === 0) return '';
  return items.map(({c,n})=>`
        <button class="qcard" onclick="openIlahi(${n})">
          <span class="num">${toArNum(n+1)}</span>
          <span class="titles">
            <span class="t-ar" style="font-family:'Crimson Pro',serif;direction:ltr;text-align:left">${c.titleArabic}</span>
            <span class="t-en">${c.titleEnglish}</span>
          </span>
          <span class="chev">›</span>
        </button>`).join('');
}

/* The reader opener for each kind, matching reopen()'s letters. */
function openFnOf(kind){
  return kind === 'q' ? 'openQasida'
       : kind === 'b' ? 'openBurdah'
       : kind === 's' ? 'openSirah'
       : 'openIlahi';
}
/* Mawlid pieces carry their kitab number in the title; drop it for display. */
function displayTitle(piece){
  const s = sectionOf(piece.titleEnglish);
  return s ? s.rest : piece.titleEnglish;
}

/* ── Landing page ────────────────────────────────────────────────
   The app opens here rather than dropping straight into the mawlid, so the
   calligraphy has room and each section can introduce itself. Counts are
   computed live, so they stay right as content is added. */
const HOME_CARDS = [
  { id:'mawlid',  ar:'مولد الديبعي', en:'Mawlid ad-Daybaʿi', desc:'The mawlid of Imam ad-Daybaʿī — read straight through, in order.' },
  { id:'qasidas', ar:'القصائد',      en:'Qasidas',           desc:'Poems in praise of the Prophet ﷺ.' },
  { id:'burdah',  ar:'البردة',        en:'Burdah',            desc:'Imam al-Būṣīrī’s celebrated poem, with audio for every chapter.' },
  { id:'ilahis',  ar:'الإلهيات',      en:'Turkish Ilahis',    desc:'Devotional songs in Turkish, with translation.' },
  { id:'favs',    ar:'المفضلة',       en:'Favorites',         desc:'Whatever you bookmark, kept on this device.' },
];

function sectionCount(id){
  return id === 'mawlid'  ? mawlidItems().length
       : id === 'qasidas' ? additionalQasidaItems().length
       : id === 'burdah'  ? BURDAH_CHAPTERS.length
       : id === 'ilahis'  ? ILAHI_CHAPTERS.length
       : favItems().length;
}
function countLabel(id, n){
  if(id === 'favs')    return n ? n + (n === 1 ? ' bookmark' : ' bookmarks') : 'Nothing saved yet';
  if(id === 'mawlid')  return n + ' sections';
  if(id === 'burdah')  return n + ' chapters';
  if(id === 'qasidas') return n + (n === 1 ? ' qasida' : ' qasidas');
  return n + (n === 1 ? ' ilahi' : ' ilahis');
}

/* Bismillah panel shown on the landing page, between the header and the search
   box. Drawn with the bundled font's calligraphic ﷽ ligature rather than an
   image, so it stays crisp at any size, adapts to dark mode, adds no weight,
   and is our own — no artist's work reproduced. */
const BISMILLAH = `
  <div class="bismillah-panel">
    <span class="bp-rule"></span>
    <span class="bp-text" role="img"
          aria-label="بِسْمِ اللّٰهِ الرَّحْمٰنِ الرَّحِيْمِ"
          title="Bismillāh ar-Raḥmān ar-Raḥīm">﷽</span>
    <span class="bp-rule"></span>
  </div>`;

function homeCards(){
  const sessionLabel = session.role
    ? (session.role === 'leader' ? 'Leading · ' + session.code : 'Following · ' + session.code)
    : 'Not connected';
  return `<div class="home-grid">${HOME_CARDS.map(c => `
      <button class="home-card" onclick="selectTab('${c.id}')">
        <span class="hc-ar">${c.ar}</span>
        <span class="hc-en">${c.en}</span>
        <span class="hc-count">${countLabel(c.id, sectionCount(c.id))}</span>
      </button>`).join('')}
      <button class="home-card" onclick="selectTab('session')">
        <span class="hc-ar">مجلس مشترك</span>
        <span class="hc-en">Live Session</span>
        <span class="hc-count">${sessionLabel}</span>
      </button></div>`;
}

/* Each section introduces itself at the top of its own page, rather than
   crowding the landing page. */
function sectionIntro(id){
  const c = HOME_CARDS.find(x => x.id === id);
  return c ? `<div class="section-intro">${c.desc}</div>` : '';
}

function goHome(){
  stopAutoScroll();
  state.tab = 'home';
  state.query = '';
  renderIndex();
}

function favCards(){
  const items = favItems();
  if(items.length === 0) return '';
  return items.map(({kind, idx, piece}, n) => `
        <button class="qcard" onclick="${openFnOf(kind)}(${idx})">
          <span class="num">${toArNum(n+1)}</span>
          <span class="titles">
            <span class="t-ar"${kind === 'i' ? ` style="font-family:'Crimson Pro',serif;direction:ltr;text-align:left"` : ''}>${piece.titleArabic}</span>
            <span class="t-en">${displayTitle(piece)}</span>
          </span>
          <span class="chev">›</span>
        </button>`).join('');
}

function label(txt, top){
  return `<div class="index-label"${top?' style="margin-top:1.8rem"':''}>${txt}</div>`;
}

/* Content for the currently selected tab. */
function renderResults(){
  const tab = state.tab;
  const q = state.query;

  // ---- SEARCH MODE: search the whole app, from whichever tab you're on ----
  if(q){
    let html = '';
    const mawlid = mawlidCards();
    if(mawlid) html += label('Mawlid ad-Daybaʿi · مولد الديبعي') + mawlid;
    const qas = additionalQasidaCards();
    if(qas) html += label('Qasidas · القصائد', !!mawlid) + qas;
    const burd = burdahCards();
    if(burd) html += label('Burdah · البردة', !!mawlid || !!qas) + burd;
    const ilahis = ilahiCards();
    if(ilahis) html += label('Turkish Ilahis · الإلهيات', !!mawlid || !!qas || !!burd) + ilahis;
    if(!html) return `<div class="no-results">No matches for "${q.replace(/</g,'&lt;')}". Try a different spelling.</div>`;
    return html;
  }

  // ---- BROWSE MODE: just the current tab ----
  /* The home tab needs a branch here too, not only in renderIndex(): typing and
     then deleting a search calls updateSearch(), which re-renders this alone.
     Without it, clearing the query left the page blank with no way back. */
  if(tab === 'home')    return homeCards();
  if(tab === 'mawlid')  return sectionIntro('mawlid') + label('Follow the mawlid in order · على ترتيب المولد') + mawlidCards();
  if(tab === 'qasidas') return sectionIntro('qasidas') + (additionalQasidaCards() || placeholder('Qasidas'));
  if(tab === 'ilahis')  return sectionIntro('ilahis') + label('Select an ilahi · ilahi seçin') + ilahiCards();
  if(tab === 'favs'){
    const cards = favCards();
    return cards
      ? sectionIntro('favs') + label('Your favorites · المفضلة') + cards
      : `<div class="no-results">No favorites yet.<br><br>Open any piece and tap the bookmark beside its title to save it here.<br><br>Favorites are kept on this device only — they aren't shared with anyone else using the app.</div>`;
  }
  if(tab === 'burdah'){
    return sectionIntro('burdah') + label('Select a chapter · اختر فصلاً') + burdahCards();
  }
  return '';
}

/* Which tabs get a search box — all of them. */

  return true;
}
